<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Work Orders</title>
<style>
  :root {
    --bg:#eef1ef; --panel:#fff; --panel-2:#f7f9f7; --ink:#15201d; --muted:#5a6a65; --faint:#8a9a94;
    --line:#e2e7e4; --line-2:#d2dad6; --accent:#0f6f66; --accent-h:#148a7e; --accent-soft:#e4f1ee;
    --good:#1e8e5a; --good-soft:color-mix(in srgb,#1e8e5a 14%,transparent);
    --warn:#b3760f; --warn-soft:color-mix(in srgb,#b3760f 15%,transparent);
    --crit:#c0453b; --crit-soft:color-mix(in srgb,#c0453b 12%,transparent);
    --info:#3a6ea5; --info-soft:color-mix(in srgb,#3a6ea5 13%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --sh:0 1px 2px rgba(16,32,28,.05); --sh-2:0 8px 30px rgba(16,32,28,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d1512; --panel:#141f1b; --panel-2:#111b17; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6c7d77;
      --line:#25322d; --line-2:#33433d; --accent:#38b4a4; --accent-h:#54c6b7; --accent-soft:#16302c;
      --good:#37b37a; --good-soft:color-mix(in srgb,#37b37a 16%,transparent);
      --warn:#d69b3a; --warn-soft:color-mix(in srgb,#d69b3a 15%,transparent);
      --crit:#e0685d; --crit-soft:color-mix(in srgb,#e0685d 15%,transparent);
      --info:#6c9fd6; --info-soft:color-mix(in srgb,#6c9fd6 15%,transparent); --sh-2:0 10px 34px rgba(0,0,0,.4); }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; overflow:hidden; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,h4 { margin:0; } .mono { font-family:var(--mono); } .num { font-variant-numeric:tabular-nums; }
  .lbl { font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); font-weight:700; font-family:var(--mono); }

  button { font:inherit; cursor:pointer; }
  .btn { font-weight:600; font-size:13px; padding:7px 13px; border-radius:9px; border:1px solid var(--line-2); background:var(--panel); color:var(--ink); display:inline-flex; align-items:center; gap:7px; transition:border-color .12s, background .12s, color .12s; white-space:nowrap; }
  .btn:hover { border-color:var(--faint); } .btn.primary { background:var(--accent); color:#fff; border-color:transparent; } .btn.primary:hover { background:var(--accent-h); }
  .btn.ghost { border-color:transparent; background:transparent; color:var(--muted); } .btn.ghost:hover { background:var(--panel-2); color:var(--ink); }
  .btn.sm { padding:5px 10px; font-size:12px; border-radius:8px; } .btn.danger { color:var(--crit); border-color:color-mix(in srgb,var(--crit) 30%,transparent); } .btn:disabled { opacity:.4; cursor:not-allowed; }
  .x { border:0; background:transparent; color:var(--faint); padding:2px 5px; border-radius:6px; font-size:13px; } .x:hover { color:var(--crit); background:var(--crit-soft); }

  input[type=text],input[type=number],input[type=date],textarea,select { font:inherit; padding:8px 10px; border:1px solid var(--line-2); border-radius:8px; background:var(--bg); color:var(--ink); outline:none; width:100%; }
  :where(input,textarea,select):focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea { resize:vertical; min-height:50px; }

  .chip { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .chip.dot::before { content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
  .c-open { color:var(--info); background:var(--info-soft); } .c-active { color:var(--accent); background:var(--accent-soft); }
  .c-on_hold { color:var(--warn); background:var(--warn-soft); } .c-done { color:var(--good); background:var(--good-soft); } .c-rejected { color:var(--crit); background:var(--crit-soft); }
  .prio { font-size:11px; font-weight:700; padding:1px 8px; border-radius:999px; } .prio-low { color:var(--faint); background:var(--panel-2); } .prio-medium { color:var(--info); background:var(--info-soft); } .prio-high { color:var(--warn); background:var(--warn-soft); } .prio-urgent { color:var(--crit); background:var(--crit-soft); }

  .topbar { height:52px; display:flex; align-items:center; gap:12px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:9px; font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .brand .mark { color:var(--accent); } .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .topbar .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; } .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:var(--good-soft); }

  .app { display:flex; height:calc(100vh - 52px); }
  .rail { width:320px; flex:none; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  .rail-top { padding:14px 14px 10px; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid var(--line); }
  .search { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--line-2); border-radius:9px; padding:7px 11px; } .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); } .search input { border:0; background:transparent; padding:0; }
  .rail-list { flex:1; overflow-y:auto; padding:8px; }
  .grp { margin:6px 6px 2px; display:flex; align-items:center; gap:8px; } .grp .lbl2 { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; } .grp .n { font-family:var(--mono); font-size:10px; color:var(--faint); }

  .card { width:100%; text-align:left; display:flex; flex-direction:column; gap:6px; padding:10px 11px; margin:3px 0; background:var(--panel); border:1px solid var(--line); border-radius:11px; color:var(--ink); position:relative; }
  .card:hover { border-color:var(--faint); } .card.sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
  .card .r1 { display:flex; align-items:center; gap:8px; } .card .num2 { font-family:var(--mono); font-size:11px; color:var(--faint); } .card .r1 .sp { margin-left:auto; }
  .card .ttl { font-weight:600; font-size:13.5px; line-height:1.3; }
  .card .r2 { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .card .due { font-family:var(--mono); font-size:10.5px; color:var(--muted); } .card .due.over { color:var(--crit); font-weight:700; }

  .detail { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); text-align:center; padding:40px; } .empty .big { font-size:17px; color:var(--ink); font-weight:650; }
  .dhead { background:var(--panel); border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .dtitle { font-size:20px; font-weight:700; letter-spacing:-.02em; line-height:1.2; }
  .dsub { display:flex; align-items:center; gap:8px; margin-top:6px; font-size:12.5px; color:var(--muted); flex-wrap:wrap; } .dsub .code { font-family:var(--mono); }
  .dhead-right { margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }

  .actionbar { background:var(--panel); border-bottom:1px solid var(--line); padding:12px 22px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .actionbar .al { font-size:11px; font-weight:700; color:var(--faint); text-transform:uppercase; letter-spacing:.05em; }
  .tact { display:flex; flex-direction:column; }
  .guards { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; } .gd { font-size:10px; font-family:var(--mono); padding:1px 6px; border-radius:5px; display:inline-flex; align-items:center; gap:3px; }
  .gd.met { color:var(--good); background:var(--good-soft); } .gd.unmet { color:var(--warn); background:var(--warn-soft); } .gd.adv { color:var(--muted); background:var(--panel-2); }

  .dtabs { background:var(--panel); border-bottom:1px solid var(--line); padding:0 22px; display:flex; gap:2px; }
  .dtab { border:0; background:transparent; color:var(--muted); font-weight:600; font-size:13.5px; padding:11px 14px; border-bottom:2px solid transparent; margin-bottom:-1px; } .dtab:hover { color:var(--ink); } .dtab.on { color:var(--accent); border-bottom-color:var(--accent); }
  .dtab .pill { font-family:var(--mono); font-size:10px; font-weight:700; margin-left:6px; color:var(--muted); background:var(--panel-2); border:1px solid var(--line); padding:0 6px; border-radius:999px; }
  .dbody { flex:1; overflow-y:auto; padding:22px; } .wrap { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }

  .sec { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--sh); }
  .sec > header { padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; } .sec > header h3 { font-size:13.5px; font-weight:660; } .sec > header .ct { font-family:var(--mono); font-size:11px; color:var(--faint); } .sec > header .hact { margin-left:auto; display:flex; gap:8px; }
  .sec-body { padding:16px; display:flex; flex-direction:column; gap:12px; }
  .kv { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px 18px; } .kv .k { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.05em; font-weight:700; } .kv .v { font-weight:560; margin-top:2px; } .kv .v.mono { font-family:var(--mono); font-weight:500; }
  .infobar { display:flex; align-items:flex-start; gap:9px; font-size:12.5px; border-radius:10px; padding:10px 14px; } .infobar.i { color:var(--info); background:var(--info-soft); border:1px solid color-mix(in srgb,var(--info) 22%,transparent); } .infobar.w { color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 25%,transparent); } .infobar b { color:var(--ink); }
  .planbar { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; }
  .planbar .field { display:flex; flex-direction:column; gap:4px; } .planbar .field .lbl { margin-bottom:1px; }

  .task { border:1px solid var(--line); border-radius:11px; background:var(--panel-2); } .task + .task { margin-top:8px; }
  .task-top { display:flex; align-items:center; gap:10px; padding:10px 12px; } .tseq { font-family:var(--mono); font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 9px; font-size:12px; flex:none; }
  .tname { flex:1; min-width:0; } .tname .ti { font-weight:560; } .tname .tm { font-family:var(--mono); font-size:10px; color:var(--faint); }
  .tresp { padding:0 12px 12px 50px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; } .tresp .rin { max-width:180px; }
  .oor { color:var(--crit); font-weight:700; font-size:11px; }
  .chk { width:18px; height:18px; accent-color:var(--accent); cursor:pointer; }

  table.tbl { width:100%; border-collapse:collapse; } table.tbl th { text-align:left; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); font-family:var(--mono); font-weight:700; padding:8px 10px; border-bottom:1px solid var(--line); }
  table.tbl td { padding:9px 10px; border-bottom:1px solid var(--line); } table.tbl tbody tr:last-child td { border-bottom:0; } table.tbl td.r, table.tbl th.r { text-align:right; font-variant-numeric:tabular-nums; }
  tr.tot td { font-weight:700; border-top:2px solid var(--line-2); }

  .timeline { display:flex; flex-direction:column; } .tev { display:flex; gap:12px; padding-bottom:14px; position:relative; } .tev:not(:last-child)::before { content:""; position:absolute; left:7px; top:16px; bottom:0; width:2px; background:var(--line); }
  .tev .dot { width:16px; height:16px; border-radius:50%; border:2px solid var(--panel); background:var(--accent); flex:none; margin-top:1px; box-shadow:0 0 0 1px var(--line-2); } .tev.rej .dot { background:var(--crit); } .tev.hold .dot { background:var(--warn); }
  .tev .tc { flex:1; } .tev .th { font-weight:600; } .tev .tt { font-family:var(--mono); font-size:11px; color:var(--faint); } .tev .tr { font-size:12.5px; color:var(--muted); margin-top:2px; }

  .board { display:flex; gap:14px; padding:22px; overflow-x:auto; height:100%; align-items:flex-start; }
  .col { flex:none; width:270px; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column; max-height:100%; }
  .col > header { padding:11px 13px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); position:sticky; top:0; } .col > header .n { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .col .colbody { padding:9px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
  .col .colbody .empty-c { color:var(--faint); font-size:12px; font-style:italic; padding:8px; text-align:center; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:11px 18px; border-radius:10px; font-size:13px; font-weight:560; box-shadow:var(--sh-2); z-index:80; opacity:0; transition:opacity .2s, transform .2s; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }
  .ovl { position:fixed; inset:0; background:rgba(12,22,18,.5); display:flex; align-items:center; justify-content:center; padding:24px; z-index:60; } .modal { background:var(--panel); border:1px solid var(--line); border-radius:16px; width:min(440px,100%); box-shadow:var(--sh-2); } .modal header { padding:15px 18px; border-bottom:1px solid var(--line); font-weight:660; } .modal .mbody { padding:16px 18px; display:flex; flex-direction:column; gap:12px; } .modal .mfoot { padding:12px 18px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; }

  .back-mobile { display:none; }
  @media (max-width:720px){
    .app { display:block; position:relative; }
    .rail { width:100%; height:calc(100vh - 52px); }
    .detail { display:none; position:absolute; inset:0; height:calc(100vh - 52px); }
    #app.show-detail .rail { display:none; } #app.show-detail .detail { display:flex; }
    .back-mobile { display:inline-flex; }
    .dhead, .actionbar, .dtabs { padding-left:14px; padding-right:14px; } .dbody { padding:14px; }
    .board { padding:14px; }
  }

  /* workflow editor */
  .editor { width:min(900px,100%); max-height:88vh; display:flex; flex-direction:column; }
  .editor .mbody { overflow-y:auto; }
  .wf-sec { margin-bottom:18px; } .wf-sec > h4 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); font-family:var(--mono); margin:0 0 8px; display:flex; align-items:center; gap:8px; }
  .wf-sec > h4 .ct { color:var(--faint); }
  .wf-state { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); }
  .wf-state:last-child { border-bottom:0; }
  .wf-state .ord { display:flex; flex-direction:column; gap:1px; } .wf-state .ord button { border:0; background:transparent; color:var(--faint); cursor:pointer; padding:0 3px; line-height:1; font-size:11px; } .wf-state .ord button:hover { color:var(--accent); } .wf-state .ord button:disabled { opacity:.3; cursor:not-allowed; }
  .wf-state .sid { font-family:var(--mono); font-size:11px; color:var(--faint); width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wf-state input.lbl-in { flex:1; max-width:220px; }
  .wf-badge { font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; padding:2px 7px; border-radius:5px; color:var(--good); background:var(--good-soft); }
  .wf-trans { border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; background:var(--panel-2); display:flex; flex-direction:column; gap:8px; }
  .wf-trans .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .wf-trans select, .wf-trans input { width:auto; }
  .wf-trans .arrow { color:var(--faint); font-weight:700; }
  .wf-trans .lbl-in { flex:1; min-width:120px; }
  .wf-trans textarea { min-height:38px; font-family:var(--mono); font-size:12px; }
  .wf-add { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:8px; }
  .wf-derived { font-size:12px; color:var(--muted); background:var(--panel-2); border:1px solid var(--line); border-radius:9px; padding:9px 12px; } .wf-derived b { color:var(--ink); }
  .wf-field { display:flex; flex-direction:column; gap:3px; } .wf-field .lbl { margin-bottom:1px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/></svg>Plantree <small>· Work Orders</small></div>
    <div class="right">
      <button class="btn sm" id="genBtn" title="Run the PM generation engine for the seeded generator schedule">⚙ Generate PM work</button>
      <span class="status ok">demo</span>
    </div>
  </div>
  <div class="app" id="app">
    <aside class="rail">
      <div class="rail-top">
        <div style="display:flex;gap:8px">
          <button class="btn primary" id="newWoBtn" style="flex:1;justify-content:center">+ New work order</button>
          <button class="btn" id="wfBtn" title="Edit workflow (states & transitions)">⚙</button>
        </div>
        <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--faint)"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg><input id="q" placeholder="Search work orders & requests…" /></div>
      </div>
      <div class="rail-list" id="railList"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
  <div class="toast" id="toast"></div>
  <div id="modalHost"></div>

<script src="pm-generate.js"></script>
<script src="workflow-engine.js"></script>
<script>
/* ---------------- helpers ---------------- */
function el(t, p, k) {
  var n = document.createElement(t);
  if (p) Object.keys(p).forEach(function (key) {
    if (key === "class") n.className = p[key];
    else if (key === "html") n.innerHTML = p[key];
    else if (key.slice(0, 2) === "on") n.addEventListener(key.slice(2), p[key]);
    else if (key in n) { try { n[key] = p[key]; } catch (e) { n.setAttribute(key, p[key]); } }
    else n.setAttribute(key, p[key]);
  });
  (k || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return n;
}
function nowISO() { return new Date().toISOString(); }
function fmtDate(iso) { return iso ? iso.slice(0, 10) : "—"; }
function fmtDT(iso) { return iso ? iso.slice(0, 16).replace("T", " ") : "—"; }
function money(n) { return n == null ? "—" : "$" + n.toFixed(2); }
function idseq(pfx) { idseq._n = (idseq._n || 0) + 1; return pfx + "_" + Date.now().toString(36) + idseq._n; }

/* ---------------- work-order type catalogue ---------------- */
var WOT = {
  PM: { name: "Preventative", cls: "c-active" },
  RM: { name: "Reactive", cls: "c-rejected" },
  AD: { name: "Administrative", cls: "c-open" },
  OP: { name: "Operations", cls: "c-on_hold" }
};
function wotChip(code) { var w = WOT[code] || { name: code, cls: "c-open" }; return el("span", { class: "chip " + w.cls, title: w.name + " (" + code + ")" }, [code]); }

/* ---------------- seed: default workflow profile (configurable state machine) ----------------
 * The lifecycle is data — ordered {id,label} states + first-class transitions with
 * trigger / guards (expressions) / actions. Terminality is derived from the graph by
 * workflow-engine.js; guards evaluate against woScope(wo). See doc 13. */
var PROFILE = {
  id: "wfp_default", type: "workflowProfile", key: "default", name: "Default work-order workflow", isDefault: true,
  entryStates: ["requested", "planned", "scheduled"],
  states: [
    { id: "requested", label: "Requested" }, { id: "reviewed", label: "Reviewed" }, { id: "approved", label: "Approved" },
    { id: "planned", label: "Planned" }, { id: "scheduled", label: "Scheduled" }, { id: "assigned", label: "Assigned" },
    { id: "in_progress", label: "In progress" }, { id: "awaiting_parts_access", label: "Awaiting parts/access" },
    { id: "completed", label: "Completed" }, { id: "verified", label: "Verified" }, { id: "closed", label: "Closed" },
    { id: "rejected", label: "Rejected" }, { id: "cancelled", label: "Cancelled" }

  var lHours = (wo.labour || []).reduce(function (s, l) { return s + (l.hours || 0); }, 0);
  var labourTbl = el("table", { class: "tbl" }, [
    el("thead", {}, [el("tr", {}, [el("th", {}, ["Who"]), el("th", {}, ["Trade"]), el("th", { class: "r" }, ["Hours"]), el("th", { class: "r" }, ["Rate"]), el("th", { class: "r" }, ["Cost"])])]),
    el("tbody", {}, lrows.length ? lrows.concat([el("tr", { class: "tot" }, [el("td", { colspan: 2 }, ["Total"]), el("td", { class: "r" }, [String(lHours)]), el("td", {}, [""]), el("td", { class: "r" }, [money(lTotal)])])]) : [el("tr", {}, [el("td", { colspan: 5, style: "color:var(--faint);font-style:italic" }, ["No labour booked."])])])
  ]);
  var labAct = segId(wo) === "active" ? [el("button", { class: "btn sm", onclick: function () { logLabour(wo); } }, ["+ Log 1 h"])] : null;
  wrap.appendChild(sec("Labour", null, [labourTbl], labAct));
  // parts
  var prows = (wo.parts || []).map(function (p) { return el("tr", {}, [el("td", {}, [p.description]), el("td", { class: "r" }, [p.reservedQty != null ? String(p.reservedQty) : "—"]), el("td", { class: "r" }, [p.consumedQty != null ? String(p.consumedQty) : "—"]), el("td", { class: "r" }, [money(p.unitCost)]), el("td", { class: "r" }, [money((p.consumedQty != null ? p.consumedQty : p.reservedQty || 0) * (p.unitCost || 0))])]); });
  var pTotal = (wo.parts || []).reduce(function (s, p) { return s + (p.consumedQty != null ? p.consumedQty : p.reservedQty || 0) * (p.unitCost || 0); }, 0);
  var partsTbl = el("table", { class: "tbl" }, [
    el("thead", {}, [el("tr", {}, [el("th", {}, ["Part"]), el("th", { class: "r" }, ["Reserved"]), el("th", { class: "r" }, ["Consumed"]), el("th", { class: "r" }, ["Unit"]), el("th", { class: "r" }, ["Cost"])])]),
    el("tbody", {}, prows.length ? prows.concat([el("tr", { class: "tot" }, [el("td", { colspan: 4 }, ["Total"]), el("td", { class: "r" }, [money(pTotal)])])]) : [el("tr", {}, [el("td", { colspan: 5, style: "color:var(--faint);font-style:italic" }, ["No parts."])])])
  ]);
  wrap.appendChild(sec("Parts", null, [el("div", { class: "infobar i", style: "margin-bottom:2px" }, [el("span", {}, ["Reserve-then-consume: reserved at ", el("b", {}, ["Scheduled"]), ", deducted at ", el("b", {}, ["Completed"]), "."])]), partsTbl]));
  // total
  wrap.appendChild(el("div", { style: "text-align:right;font-family:var(--mono);font-size:15px;font-weight:700" }, ["Work order total: " + money(lTotal + pTotal)]));
}

function renderHistory(wrap, wo) {
  var evs = (wo.statusHistory || []).slice().reverse();
  wrap.appendChild(sec("Transition history", wo.statusHistory.length, [
    el("div", { class: "timeline" }, evs.map(function (e) {
      var cls = e.to === "rejected" ? "rej" : (e.to === "awaiting_parts_access" ? "hold" : "");
      return el("div", { class: "tev " + cls }, [el("div", { class: "dot" }), el("div", { class: "tc" }, [
        el("div", { class: "th" }, [(e.from ? stateOf(e.from).label + " → " : "") + stateOf(e.to).label]),
        el("div", { class: "tt" }, [fmtDT(e.at) + " · " + (e.by || "—")]),
        e.reason ? el("div", { class: "tr" }, [e.reason]) : null
      ])]);
    }))
  ]));
}

function renderRequest() {
  var wr = S.requests.filter(function (r) { return r.id === S.sel.id; })[0];
  var host = el("div", { class: "detail", style: "display:flex" });
  host.appendChild(el("div", { class: "dhead" }, [
    el("div", {}, [
      el("div", { class: "dtitle" }, [wr.summary]),
      el("div", { class: "dsub" }, [el("button", { class: "btn ghost sm back-mobile", onclick: function () { document.getElementById("app").classList.remove("show-detail"); } }, ["‹ List"]), el("span", { class: "code" }, [wr.requestNumber]), el("span", {}, ["· from " + (wr.source || "portal")])])
    ]),
    el("div", { class: "dhead-right" }, [el("div", { style: "display:flex;gap:8px" }, [el("span", { class: "prio prio-" + wr.priority }, [wr.priority]), el("span", { class: "chip c-open" }, [wr.status])])])
  ]));
  var body = el("div", { class: "dbody" }); var wrap = el("div", { class: "wrap" }); body.appendChild(wrap);
  wrap.appendChild(sec("Request", null, [
    el("div", { class: "kv" }, [kv("Asset", wr.assetId || "—", true), kv("Location", wr.locationId || "—", true), kv("Reported by", wr.reportedBy || "—"), kv("Reported", fmtDT(wr.reportedAt), true)]),
    wr.description ? el("div", { style: "color:var(--muted)" }, [wr.description]) : null
  ]));
  if (wr.status === "submitted" || wr.status === "under_review") {
    wrap.appendChild(el("div", { class: "actionbar", style: "border-radius:14px;border:1px solid var(--line)" }, [
      el("span", { class: "al" }, ["Triage"]),
      el("button", { class: "btn primary sm", onclick: function () { convertRequest(wr); } }, ["Convert to work order →"]),
      el("span", { style: "font-size:12px;color:var(--faint)" }, ["Creates a reactive (RM) order at ", el("b", {}, ["requested"]), ", carrying provenance."])
    ]));
  } else {
    wrap.appendChild(el("div", { class: "infobar i" }, [el("span", {}, ["Converted to ", el("b", {}, [wr.workOrderId]), "."])]));
  }
  body && host.appendChild(body);
  // wrap host so renderDetail can appendChild a single node
  var container = document.createDocumentFragment(); container.appendChild(host);
  var m = document.createElement("div"); m.style.display = "contents"; m.appendChild(host);
  return m;
}

function renderBoard() {
  var board = el("div", { class: "board" });
  SEGMENTS.forEach(function (c) {
    var os = S.orders.filter(function (o) { return segId(o) === c.id && matchesQ(o); }).sort(function (a, b) { return (a.dueDate || "").localeCompare(b.dueDate || ""); });
    var col = el("div", { class: "col" }, [
      el("header", {}, [el("span", { class: "chip dot", style: segStyle(c) }, [c.label]), el("span", { class: "n" }, [String(os.length)])]),
      el("div", { class: "colbody" }, os.length ? os.map(woCard) : [el("div", { class: "empty-c" }, ["—"])])
    ]);
    board.appendChild(col);
  });
  var host = document.createElement("div"); host.style.display = "contents"; host.appendChild(board);
  return host;
}

function render() { renderRail(); renderDetail(); if (typeof EMBED !== "undefined" && EMBED) sendStats(); }

/* ---------------- wire up ---------------- */
document.getElementById("q").addEventListener("input", function (e) { S.q = e.target.value; render(); });
var _gen = document.getElementById("genBtn"); if (_gen) _gen.addEventListener("click", generatePM);
document.getElementById("newWoBtn").addEventListener("click", newWorkOrder);
document.getElementById("wfBtn").addEventListener("click", openWorkflowEditor);

/* ---------------- unified-shell (embed) support ---------------- */
var EMBED = /[?&]embed=1/.test(location.search);
if (EMBED) { var _tb = document.querySelector(".topbar"); if (_tb) _tb.style.display = "none"; var _ap = document.querySelector(".app"); if (_ap) _ap.style.height = "100vh"; }
(function () { var m = /[?&]asset=([^&]+)/.exec(location.search); if (m) { S.q = decodeURIComponent(m[1]); document.getElementById("q").value = S.q; } })();

/* Report a compact, live summary up to the shell dashboard (truthful seeded counts). */
function collectStats() {
  function cat(k) { return S.orders.filter(function (o) { return segId(o) === k; }).length; }
  var recent = S.orders.slice()
    .sort(function (a, b) { return (b.statusHistory && b.statusHistory.length ? b.statusHistory[b.statusHistory.length - 1].at : b.dueDate || "").localeCompare(a.statusHistory && a.statusHistory.length ? a.statusHistory[a.statusHistory.length - 1].at : a.dueDate || ""); })
    .slice(0, 5).map(function (wo) { return { num: wo.workOrderNumber, title: wo.title, cat: segId(wo), label: labelOf(wo.status), priority: wo.priority, type: wo.workOrderTypeCode, due: fmtDate(wo.dueDate), overdue: overdue(wo) }; });
  return {
    open: cat("open"), active: cat("active"), on_hold: cat("on_hold"), done: cat("done"), rejected: cat("rejected"),
    total: S.orders.length, overdue: S.orders.filter(overdue).length,
    requests: S.requests.filter(function (r) { return r.status !== "converted" && r.status !== "rejected"; }).length,
    recent: recent
  };
}
function sendStats() { if (!EMBED) return; try { window.parent.postMessage({ type: "plantree:stats", source: "work", data: collectStats() }, "*"); } catch (e) {} }

window.addEventListener("message", function (e) {
  var d = e.data; if (!d || typeof d !== "object") return;
  if (d.type === "plantree:generate") generatePM();
  else if (d.type === "plantree:config") { featWR = !!(d.features && d.features.workRequests); if (!featWR && S.sel && S.sel.kind === "wr") S.sel = null; render(); }
  else if (d.type === "plantree:filterAsset") { S.q = d.assetId || ""; document.getElementById("q").value = S.q; S.sel = null; render(); document.getElementById("app").classList.remove("show-detail"); }
  else if (d.type === "plantree:statsRequest") sendStats();
  else if (d.type === "plantree:board") { S.sel = null; document.getElementById("app").classList.remove("show-detail"); render(); }
  else if (d.type === "plantree:requests" && featWR) { var r = S.requests.filter(function (x) { return x.status !== "converted" && x.status !== "rejected"; })[0]; S.sel = r ? { kind: "wr", id: r.id } : null; document.getElementById("app").classList.toggle("show-detail", !!r); render(); }
  else if (d.type === "plantree:search") { S.q = d.q || ""; document.getElementById("q").value = S.q; S.sel = null; render(); }
  else if (d.type === "plantree:editWorkflow") openWorkflowEditor();
});
advanceAll();  // fire any due automatic transitions on load (lazy)
render();
</script>
