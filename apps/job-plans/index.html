<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Job Plans</title>
<style>
  :root {
    --bg:#f4f6f5; --surface:#fff; --surface-2:#fbfcfb; --ink:#16201e; --muted:#5c6b67; --faint:#8a9995;
    --line:#e0e5e2; --line-strong:#d3dad7; --accent:#0e6e66; --accent-soft:#e4f0ee;
    --good:#1e8e5a; --warn:#b77a12; --crit:#c0453b; --info:#3a6ea5;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e1613; --surface:#16211d; --surface-2:#131e1a; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6e7e79;
      --line:#26332e; --line-strong:#33433d; --accent:#37b3a4; --accent-soft:#17322e;
      --good:#37b37a; --warn:#d69b3a; --crit:#e0685d; --info:#6c9fd6; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; }
  h1,h2,h3 { margin:0; }
  .mono { font-family:var(--mono); }
  .lbl { font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; font-family:var(--mono); }

  /* toolbar */
  .toolbar { display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--surface);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:9px; font-weight:680; font-size:16px; letter-spacing:-.01em; }
  .brand .mark { color:var(--accent); }
  .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .tb-actions { display:flex; gap:8px; margin-left:8px; flex-wrap:wrap; }
  .tb-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .file-name { font-family:var(--mono); font-size:12px; color:var(--muted); }
  .file-name b { color:var(--ink); }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
  .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:color-mix(in srgb,var(--good) 12%,transparent); }
  .status.warn { color:var(--warn); background:color-mix(in srgb,var(--warn) 12%,transparent); }

  button { font:inherit; font-weight:600; font-size:13px; padding:7px 13px; border-radius:8px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink); cursor:pointer; transition:border-color .12s, background .12s; }
  button:hover { border-color:var(--faint); }
  button.primary { background:var(--accent); color:#fff; border-color:transparent; }
  button.primary:hover { filter:brightness(1.08); }
  button.small { padding:4px 9px; font-size:12px; }
  button.danger { color:var(--crit); }
  button:disabled { opacity:.45; cursor:not-allowed; }

  .layout { display:grid; grid-template-columns:minmax(0,1fr) 400px; gap:0; align-items:start; }
  .main { padding:20px; display:flex; flex-direction:column; gap:16px; min-width:0; }
  .side { position:sticky; top:57px; height:calc(100vh - 57px); border-left:1px solid var(--line); background:var(--surface-2);
    display:flex; flex-direction:column; }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:12px; }
  .card > h2 { font-size:13.5px; padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .card > h2 .count { font-family:var(--mono); font-size:11px; color:var(--muted); font-weight:500; }
  .card > h2 .spacer { margin-left:auto; }
  .card-body { padding:16px; display:flex; flex-direction:column; gap:14px; }

  .field { display:flex; flex-direction:column; gap:5px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  input[type=text], input[type=number], textarea, select {
    font:inherit; padding:8px 10px; border:1px solid var(--line-strong); border-radius:8px;
    background:var(--bg); color:var(--ink); outline:none; width:100%; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea { resize:vertical; min-height:60px; }
  input:disabled, textarea:disabled, select:disabled { opacity:.6; cursor:not-allowed; }

  /* version bar */
  .versionbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .badge { font-family:var(--mono); font-size:10px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:5px; }
  .b-draft { color:var(--muted); background:var(--surface-2); border:1px solid var(--line-strong); }
  .b-approved { color:var(--info); background:color-mix(in srgb,var(--info) 13%,transparent); }
  .b-active { color:var(--good); background:color-mix(in srgb,var(--good) 14%,transparent); }
  .b-superseded { color:var(--faint); background:var(--surface-2); }
  .b-retired { color:var(--crit); background:color-mix(in srgb,var(--crit) 12%,transparent); }
  .lock-note { display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--warn);
    background:color-mix(in srgb,var(--warn) 10%,transparent); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent);
    padding:9px 12px; border-radius:9px; }

  /* tasks */
  .task { border:1px solid var(--line); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:10px; background:var(--surface-2); }
  .task-head { display:flex; align-items:center; gap:10px; }
  .seq { font-family:var(--mono); font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:2px 8px; font-size:12px; }
  .task-head .move { margin-left:auto; display:flex; gap:4px; }
  .row-add { align-self:flex-start; }
  .rowline { display:flex; gap:8px; align-items:center; }
  .rowline input { flex:1; }
  .chip-hint { font-size:11.5px; color:var(--faint); }

  /* side / preview */
  .side-tabs { display:flex; gap:4px; padding:10px 12px; border-bottom:1px solid var(--line); }
  .side-tabs button { border:0; background:transparent; color:var(--muted); padding:5px 10px; border-radius:7px; }
  .side-tabs button.on { background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .side-body { flex:1; overflow:auto; padding:14px; }
  pre.json { font-family:var(--mono); font-size:11.5px; margin:0; white-space:pre-wrap; word-break:break-word; }
  .issues { display:flex; flex-direction:column; gap:8px; }
  .issue { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; padding:9px 11px; border-radius:8px;
    background:color-mix(in srgb,var(--crit) 9%,transparent); border:1px solid color-mix(in srgb,var(--crit) 22%,transparent); }
  .issue .path { font-family:var(--mono); font-size:11px; color:var(--crit); flex:none; }
  .all-good { display:flex; align-items:center; gap:9px; color:var(--good); font-weight:600; font-size:13px; }

  .recommend { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; color:var(--warn);
    background:color-mix(in srgb,var(--warn) 10%,transparent); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent);
    border-radius:9px; padding:10px 12px; }
  .recommend b { color:var(--ink); }
  .empty { color:var(--faint); font-size:13px; font-style:italic; }

  @media (max-width: 940px) {
    .layout { grid-template-columns:1fr; }
    .side { position:static; height:auto; border-left:0; border-top:1px solid var(--line); }
    .grid2, .grid3 { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="brand">
      <svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/>
      </svg>
      Plantree <small>· Job Plans</small>
    </div>
    <div class="tb-actions">
      <button id="newBtn">New</button>
      <button id="openBtn">Open…</button>
      <button class="primary" id="saveBtn">Save</button>
      <button id="validateBtn">Validate</button>
    </div>
    <div class="tb-right">
      <span id="fileName" class="file-name">Unsaved</span>
      <span id="support" class="status warn">checking…</span>
    </div>
  </div>

  <div class="layout">
    <div class="main" id="main"><!-- rendered --></div>
    <aside class="side">
      <div class="side-tabs">
        <button id="tabJson" class="on">JSON document</button>
        <button id="tabValid">Validation</button>
      </div>
      <div class="side-body" id="sideBody"></div>
    </aside>
  </div>

  <input type="file" id="fileInput" accept=".json" hidden />

<script>
(function () {
  "use strict";

  var RESPONSE_TYPES = ["none", "passfail", "numeric", "text", "choice"];
  var VALUE_TYPES = ["number", "text", "boolean"];
  var fsaSupported = typeof window.showOpenFilePicker === "function";

  var state = { doc: null, sel: 0, handle: null, sideTab: "json" };

  /* ---------- helpers ---------- */
  function el(tag, props, kids) {
    var n = document.createElement(tag);
    if (props) Object.keys(props).forEach(function (k) {
      if (k === "class") n.className = props[k];
      else if (k === "html") n.innerHTML = props[k];
      else if (k.slice(0, 2) === "on") n.addEventListener(k.slice(2), props[k]);
      else if (k in n) { try { n[k] = props[k]; } catch (e) { n.setAttribute(k, props[k]); } }
      else n.setAttribute(k, props[k]);
    });
    (kids || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return n;
  }
  function nowIso() { return new Date().toISOString(); }
  function slug(s) { return (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, ""); }
  function csv(arr) { return (arr || []).join(", "); }
  function parseCsv(s) { return (s || "").split(",").map(function (x) { return x.trim(); }).filter(Boolean); }

  /* ---------- model ---------- */
  function emptyVersion(v) {
    return { version: v, lifecycleState: "draft", estimatedLabourHours: null, safetyInstructions: "",
      tasks: [], plannedParts: [], requiredSkills: [], requiredTools: [], requiredPermits: [],
      parameters: [], approvedBy: null, approvedAt: null, notes: "" };
  }
  function newDoc() {
    var t = nowIso();
    return { id: "", type: "jobPlan", code: "", name: "", description: "", assetClass: "", assetModel: "", rev: 0,
      createdAt: t, createdBy: null, updatedAt: t, updatedBy: null, activeVersion: null,
      versions: [emptyVersion(1)] };
  }
  function cur() { return state.doc.versions[state.sel]; }
  function editable() { return cur().lifecycleState === "draft"; }
  function maxVersion() { return state.doc.versions.reduce(function (m, v) { return Math.max(m, v.version); }, 0); }

  function newVersion() {
    var src = cur();
    var clone = JSON.parse(JSON.stringify(src));
    clone.version = maxVersion() + 1;
    clone.lifecycleState = "draft";
    clone.approvedBy = null; clone.approvedAt = null;
    state.doc.versions.unshift(clone);
    state.sel = 0;
    render();
  }
  function setLifecycle(target) {
    var v = cur();
    if (target === "approved") { v.lifecycleState = "approved"; v.approvedAt = nowIso(); }
    else if (target === "active") {
      state.doc.versions.forEach(function (o) { if (o.lifecycleState === "active") o.lifecycleState = "superseded"; });
      v.lifecycleState = "active";
      if (!v.approvedAt) v.approvedAt = nowIso();
      state.doc.activeVersion = v.version;
    } else if (target === "retired") {
      if (state.doc.activeVersion === v.version) state.doc.activeVersion = null;
      v.lifecycleState = "retired";
    }
    render();
  }

  /* ---------- validation (aligned to schemas/job-plan.schema.json) ---------- */
  function validate(d) {
    var issues = [];
    function add(path, msg) { issues.push({ path: path, msg: msg }); }
    if (!d.code || !d.code.trim()) add("code", "Code is required.");
    if (!d.name || !d.name.trim()) add("name", "Name is required.");
    if (!d.versions || !d.versions.length) add("versions", "At least one version is required.");
    var seen = {}, actives = 0;
    (d.versions || []).forEach(function (v, i) {
      var vp = "v" + v.version;
      if (seen[v.version]) add(vp, "Duplicate version number.");
      seen[v.version] = true;
      if (v.lifecycleState === "active") actives++;
      if (!(v.tasks || []).length) add(vp + ".tasks", "Version has no tasks.");
      (v.tasks || []).forEach(function (t, j) {
        var tp = vp + ".task[" + (j + 1) + "]";
        if (!t.instruction || !t.instruction.trim()) add(tp, "Instruction is empty.");
        if (RESPONSE_TYPES.indexOf(t.responseType) < 0) add(tp, "Invalid response type.");
        if (t.responseType === "numeric" && Array.isArray(t.acceptableRange)) {
          var r = t.acceptableRange;
          if (r.length === 2 && typeof r[0] === "number" && typeof r[1] === "number" && r[0] > r[1])
            add(tp, "Acceptable range low > high.");
        }
        if (t.responseType === "choice" && !(t.choices || []).length) add(tp, "Choice task needs at least one option.");
      });
      (v.plannedParts || []).forEach(function (p, j) {
        var pp = vp + ".part[" + (j + 1) + "]";
        if (!p.description || !p.description.trim()) add(pp, "Part description is empty.");
        if (typeof p.quantity !== "number" || p.quantity < 0) add(pp, "Part quantity must be >= 0.");
      });
      (v.parameters || []).forEach(function (p, j) {
        var pp = vp + ".param[" + (j + 1) + "]";
        if (!p.key || !p.key.trim()) add(pp, "Parameter key is empty.");
        if (VALUE_TYPES.indexOf(p.valueType) < 0) add(pp, "Invalid parameter value type.");
      });
    });
    if (actives > 1) add("activeVersion", "More than one active version.");
    return issues;
  }

  /* ---------- serialize ---------- */
  function normalized() {
    var d = JSON.parse(JSON.stringify(state.doc));
    if (!d.id) d.id = "jp_" + (slug(d.code) || slug(d.name) || "plan");
    d.versions.forEach(function (v) {
      v.tasks.forEach(function (t, i) { t.seq = i + 1; });
      v.estimatedLabourHours = (v.estimatedLabourHours === "" || v.estimatedLabourHours == null) ? null : Number(v.estimatedLabourHours);
    });
    return d;
  }
  function forSave() {
    var d = normalized();
    d.updatedAt = nowIso();
    d.rev = (d.rev || 0) + 1;
    state.doc.rev = d.rev; // keep in-memory rev in step
    return d;
  }

  /* ---------- rendering ---------- */
  function badge(stateStr) { return el("span", { class: "badge b-" + stateStr }, [stateStr]); }

  function render() {
    var main = document.getElementById("main");
    main.innerHTML = "";
    main.appendChild(headerCard());
    main.appendChild(versionCard());
    if (!editable()) main.appendChild(lockNote());
    main.appendChild(detailsCard());
    main.appendChild(tasksCard());
    main.appendChild(partsCard());
    main.appendChild(requirementsCard());
    main.appendChild(parametersCard());
    updateSide();
    updateFileName();
  }

  function bind(obj, key, opts) {
    opts = opts || {};
    var val = obj[key];
    var input = el(opts.tag || "input", Object.assign({
      type: opts.type || "text",
      value: val == null ? "" : val,
      placeholder: opts.placeholder || "",
      disabled: opts.disabled || false
    }, opts.attrs || {}));
    if (opts.tag === "textarea") input.value = val == null ? "" : val;
    input.addEventListener("input", function () {
      var raw = input.value;
      obj[key] = opts.number ? (raw === "" ? null : Number(raw)) : raw;
      if (opts.onchange) opts.onchange();
      updateSide();
    });
    return input;
  }

  function headerCard() {
    var d = state.doc;
    var body = el("div", { class: "card-body" }, [
      el("div", { class: "grid2" }, [
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Code"]), bind(d, "code", { placeholder: "JP-UPS-QTR" })]),
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Name"]), bind(d, "name", { placeholder: "Quarterly UPS Inspection" })])
      ]),
      el("div", { class: "grid2" }, [
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Asset class"]), bind(d, "assetClass", { placeholder: "UPS" })]),
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Asset model (optional)"]), bind(d, "assetModel", { placeholder: "Schneider Galaxy VX" })])
      ]),
      el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Description"]),
        bind(d, "description", { tag: "textarea", placeholder: "Optional summary of the plan…" })])
    ]);
    return el("div", { class: "card" }, [el("h2", {}, ["Job plan"]), body]);
  }

  function versionCard() {
    var d = state.doc, v = cur();
    var sel = el("select", { disabled: false, onchange: function () { state.sel = Number(sel.value); render(); } },
      d.versions.map(function (ver, i) {
        return el("option", { value: i, selected: i === state.sel }, ["v" + ver.version + " · " + ver.lifecycleState]);
      }));
    var actions = [];
    if (v.lifecycleState === "draft") actions.push(el("button", { class: "small", onclick: function () { setLifecycle("approved"); } }, ["Approve"]));
    if (v.lifecycleState === "approved" || v.lifecycleState === "superseded") actions.push(el("button", { class: "small primary", onclick: function () { setLifecycle("active"); } }, ["Make active"]));
    if (v.lifecycleState !== "retired" && v.lifecycleState !== "draft") actions.push(el("button", { class: "small danger", onclick: function () { setLifecycle("retired"); } }, ["Retire"]));

    var bar = el("div", { class: "versionbar" }, [
      el("span", { class: "lbl" }, ["Version"]), sel, badge(v.lifecycleState),
      el("span", { class: "spacer", style: "flex:1" }),
      el("button", { class: "small", onclick: newVersion, title: "Clone this version into a new editable draft" }, ["+ New version"])
    ].concat(actions));
    return el("div", { class: "card" }, [el("h2", {}, ["Lifecycle", el("span", { class: "count" }, [d.versions.length + " version(s)"])]),
      el("div", { class: "card-body" }, [bar])]);
  }

  function lockNote() {
    return el("div", { class: "lock-note" }, [
      el("span", { html: "&#128274;" }),
      el("span", {}, ["This version is " + cur().lifecycleState + " and locked. Approved history is never edited in place — use "]),
      el("button", { class: "small", onclick: newVersion }, ["+ New version"]),
      el("span", {}, [" to make changes."])
    ]);
  }

  function detailsCard() {
    var v = cur(), dis = !editable();
    var body = el("div", { class: "card-body" }, [
      el("div", { class: "grid2" }, [
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Estimated labour (hours)"]),
          bind(v, "estimatedLabourHours", { type: "number", number: true, placeholder: "1.5", disabled: dis, attrs: { step: "0.25", min: "0" } })]),
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Approved by"]),
          bind(v, "approvedBy", { placeholder: "—", disabled: true })])
      ]),
      el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Safety instructions"]),
        bind(v, "safetyInstructions", { tag: "textarea", placeholder: "Isolation, PPE, permits…", disabled: dis })]),
      el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Notes (this version)"]),
        bind(v, "notes", { tag: "textarea", placeholder: "What changed in this version…", disabled: dis })])
    ]);
    return el("div", { class: "card" }, [el("h2", {}, ["Details"]), body]);
  }

  function tasksCard() {
    var v = cur(), dis = !editable();
    var list = el("div", { class: "card-body" }, []);
    if (!v.tasks.length) list.appendChild(el("div", { class: "empty" }, ["No tasks yet."]));
    v.tasks.forEach(function (t, i) { list.appendChild(taskRow(t, i, dis)); });
    if (!dis) list.appendChild(el("button", { class: "small row-add", onclick: function () {
      v.tasks.push({ seq: v.tasks.length + 1, instruction: "", responseType: "none", unit: null, acceptableRange: null, choices: null, requiredSkills: [] });
      render();
    } }, ["+ Add task"]));
    return el("div", { class: "card" }, [el("h2", {}, ["Tasks", el("span", { class: "count" }, [v.tasks.length + ""])]), list]);
  }

  function taskRow(t, i, dis) {
    var v = cur();
    var head = el("div", { class: "task-head" }, [
      el("span", { class: "seq" }, [(i + 1) + ""]),
      el("select", { disabled: dis, onchange: function (e) {
          t.responseType = e.target.value;
          if (t.responseType !== "numeric") { t.acceptableRange = null; t.unit = null; }
          if (t.responseType !== "choice") t.choices = null;
          if (t.responseType === "choice" && !t.choices) t.choices = [];
          render();
        } },
        RESPONSE_TYPES.map(function (rt) { return el("option", { value: rt, selected: rt === t.responseType }, [rt]); })),
      el("div", { class: "move" }, [
        el("button", { class: "small", disabled: dis || i === 0, title: "Move up", onclick: function () { swap(v.tasks, i, i - 1); render(); } }, ["↑"]),
        el("button", { class: "small", disabled: dis || i === v.tasks.length - 1, title: "Move down", onclick: function () { swap(v.tasks, i, i + 1); render(); } }, ["↓"]),
        el("button", { class: "small danger", disabled: dis, title: "Remove", onclick: function () { v.tasks.splice(i, 1); render(); } }, ["✕"])
      ])
    ]);
    var kids = [head, bind(t, "instruction", { tag: "textarea", placeholder: "Step instruction…", disabled: dis, attrs: { style: "min-height:44px" } })];
    if (t.responseType === "numeric") {
      var lo = el("input", { type: "number", value: t.acceptableRange ? t.acceptableRange[0] : "", placeholder: "low", disabled: dis, step: "any" });
      var hi = el("input", { type: "number", value: t.acceptableRange ? t.acceptableRange[1] : "", placeholder: "high", disabled: dis, step: "any" });
      function upd() {
        if (lo.value === "" && hi.value === "") { t.acceptableRange = null; }
        else t.acceptableRange = [Number(lo.value || 0), Number(hi.value || 0)];
        updateSide();
      }
      lo.addEventListener("input", upd); hi.addEventListener("input", upd);
      kids.push(el("div", { class: "grid3" }, [
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Unit"]), bind(t, "unit", { placeholder: "V, mOhm…", disabled: dis })]),
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Accept low"]), lo]),
        el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Accept high"]), hi])
      ]));
    }
    if (t.responseType === "choice") {
      var choicesInput = el("input", { type: "text", value: csv(t.choices), placeholder: "Good, Monitor, Action required", disabled: dis });
      choicesInput.addEventListener("input", function () { t.choices = parseCsv(choicesInput.value); updateSide(); });
      kids.push(el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Choices (comma-separated)"]), choicesInput]));
    }
    var skillsInput = el("input", { type: "text", value: csv(t.requiredSkills), placeholder: "e.g. Battery maintenance", disabled: dis });
    skillsInput.addEventListener("input", function () { t.requiredSkills = parseCsv(skillsInput.value); updateSide(); });
    kids.push(el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Required skills (comma-separated)"]), skillsInput]));
    return el("div", { class: "task" }, kids);
  }

  function partsCard() {
    var v = cur(), dis = !editable();
    var body = el("div", { class: "card-body" }, []);
    if (!v.plannedParts.length) body.appendChild(el("div", { class: "empty" }, ["No planned parts."]));
    v.plannedParts.forEach(function (p, i) {
      var desc = el("input", { type: "text", value: p.description || "", placeholder: "Air filter, G4 panel", disabled: dis });
      var qty = el("input", { type: "number", value: p.quantity == null ? "" : p.quantity, placeholder: "1", disabled: dis, step: "any", min: "0", style: "max-width:90px" });
      var unit = el("input", { type: "text", value: p.unit || "", placeholder: "each", disabled: dis, style: "max-width:110px" });
      desc.addEventListener("input", function () { p.description = desc.value; updateSide(); });
      qty.addEventListener("input", function () { p.quantity = qty.value === "" ? 0 : Number(qty.value); updateSide(); });
      unit.addEventListener("input", function () { p.unit = unit.value || null; updateSide(); });
      body.appendChild(el("div", { class: "rowline" }, [desc, qty, unit,
        el("button", { class: "small danger", disabled: dis, onclick: function () { v.plannedParts.splice(i, 1); render(); } }, ["✕"])]));
    });
    if (!dis) body.appendChild(el("button", { class: "small row-add", onclick: function () { v.plannedParts.push({ partRef: null, description: "", quantity: 1, unit: "each" }); render(); } }, ["+ Add part"]));
    return el("div", { class: "card" }, [el("h2", {}, ["Planned parts", el("span", { class: "count" }, [v.plannedParts.length + ""])]), body]);
  }

  function requirementsCard() {
    var v = cur(), dis = !editable();
    function listField(label, key, ph) {
      var input = el("input", { type: "text", value: csv(v[key]), placeholder: ph, disabled: dis });
      input.addEventListener("input", function () { v[key] = parseCsv(input.value); updateSide(); });
      return el("label", { class: "field" }, [el("span", { class: "lbl" }, [label]), input]);
    }
    return el("div", { class: "card" }, [el("h2", {}, ["Requirements"]),
      el("div", { class: "card-body" }, [
        listField("Required skills", "requiredSkills", "Electrical – LV, Battery maintenance"),
        listField("Required tools", "requiredTools", "Impedance tester, insulated tool kit"),
        listField("Required permits", "requiredPermits", "Electrical work permit"),
        el("div", { class: "chip-hint" }, ["Comma-separated. These stay as free text until the People & Parts modules exist."])
      ])]);
  }

  function parametersCard() {
    var v = cur(), dis = !editable();
    var body = el("div", { class: "card-body" }, []);
    if (!v.parameters.length) body.appendChild(el("div", { class: "empty" }, ["No parameters."]));
    v.parameters.forEach(function (p, i) {
      var key = el("input", { type: "text", value: p.key || "", placeholder: "acceptableImpedanceMilliOhm", disabled: dis });
      var lab = el("input", { type: "text", value: p.label || "", placeholder: "Max cell impedance", disabled: dis });
      var vt = el("select", { disabled: dis }, VALUE_TYPES.map(function (x) { return el("option", { value: x, selected: x === p.valueType }, [x]); }));
      var def = el("input", { type: "text", value: p.defaultValue == null ? "" : p.defaultValue, placeholder: "default", disabled: dis, style: "max-width:120px" });
      key.addEventListener("input", function () { p.key = key.value; updateSide(); });
      lab.addEventListener("input", function () { p.label = lab.value; updateSide(); });
      vt.addEventListener("change", function () { p.valueType = vt.value; updateSide(); });
      def.addEventListener("input", function () { p.defaultValue = def.value; updateSide(); });
      body.appendChild(el("div", { class: "task" }, [
        el("div", { class: "grid2" }, [
          el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Key"]), key]),
          el("label", { class: "field" }, [el("span", { class: "lbl" }, ["Label"]), lab])
        ]),
        el("div", { class: "rowline" }, [vt, def,
          el("button", { class: "small danger", disabled: dis, onclick: function () { v.parameters.splice(i, 1); render(); } }, ["✕"])])
      ]));
    });
    if (!dis) body.appendChild(el("button", { class: "small row-add", onclick: function () { v.parameters.push({ key: "", label: "", valueType: "number", defaultValue: "", unit: null, source: "manual" }); render(); } }, ["+ Add parameter"]));
    return el("div", { class: "card" }, [el("h2", {}, ["Parameters", el("span", { class: "count" }, [v.parameters.length + ""])]), body]);
  }

  function swap(a, i, j) { var t = a[i]; a[i] = a[j]; a[j] = t; }

  /* ---------- side panel ---------- */
  function updateSide() {
    var body = document.getElementById("sideBody");
    body.innerHTML = "";
    if (state.sideTab === "json") {
      body.appendChild(el("pre", { class: "json" }, [JSON.stringify(normalized(), null, 2)]));
    } else {
      var issues = validate(normalized());
      if (!issues.length) { body.appendChild(el("div", { class: "all-good" }, [el("span", { html: "&#10003;" }), "Valid against job-plan schema."])); }
      else body.appendChild(el("div", { class: "issues" }, issues.map(function (x) {
        return el("div", { class: "issue" }, [el("span", { class: "path" }, [x.path]), el("span", {}, [x.msg])]);
      })));
    }
  }
  function updateFileName() {
    var f = document.getElementById("fileName");
    if (state.handle) f.innerHTML = "Editing <b>" + state.handle.name + "</b>";
    else if (state.doc.code) f.innerHTML = "Unsaved · <b>" + (slug(state.doc.code) || "plan") + ".json</b>";
    else f.textContent = "Unsaved";
  }

  /* ---------- file I/O ---------- */
  async function ensureRW(h) {
    var o = { mode: "readwrite" };
    if ((await h.queryPermission(o)) === "granted") return true;
    return (await h.requestPermission(o)) === "granted";
  }
  async function save() {
    var out = forSave();
    var text = JSON.stringify(out, null, 2);
    var fname = (slug(out.code) || "job-plan") + ".json";
    try {
      if (fsaSupported) {
        if (!state.handle) {
          state.handle = await window.showSaveFilePicker({ suggestedName: fname,
            types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
        }
        if (!(await ensureRW(state.handle))) return;
        var w = await state.handle.createWritable();
        await w.write(text); await w.close();
      } else {
        var blob = new Blob([text], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = el("a", { href: url, download: fname }); document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }
      render();
    } catch (e) { if (e.name !== "AbortError") alert("Save failed: " + e.message); }
  }
  function loadDoc(obj, handle) {
    // tolerate partial docs; fill defaults
    var d = newDoc();
    Object.assign(d, obj);
    if (!Array.isArray(d.versions) || !d.versions.length) d.versions = [emptyVersion(1)];
    d.versions.forEach(function (v) {
      ["tasks", "plannedParts", "requiredSkills", "requiredTools", "requiredPermits", "parameters"].forEach(function (k) { if (!Array.isArray(v[k])) v[k] = []; });
    });
    state.doc = d;
    state.handle = handle || null;
    // select active version if present, else the first
    var idx = d.versions.findIndex(function (v) { return v.version === d.activeVersion; });
    state.sel = idx >= 0 ? idx : 0;
    render();
  }
  async function open() {
    try {
      if (fsaSupported) {
        var picked = await window.showOpenFilePicker({ multiple: false, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
        var h = picked[0];
        var file = await h.getFile();
        loadDoc(JSON.parse(await file.text()), h);
      } else {
        document.getElementById("fileInput").click();
      }
    } catch (e) { if (e.name !== "AbortError") alert("Open failed: " + e.message); }
  }

  /* ---------- wire up ---------- */
  document.getElementById("newBtn").addEventListener("click", function () {
    if (state.doc && !confirm("Start a new job plan? Unsaved changes will be lost.")) return;
    state.doc = newDoc(); state.sel = 0; state.handle = null; render();
  });
  document.getElementById("openBtn").addEventListener("click", open);
  document.getElementById("saveBtn").addEventListener("click", save);
  document.getElementById("validateBtn").addEventListener("click", function () { state.sideTab = "valid"; syncTabs(); updateSide(); });
  document.getElementById("fileInput").addEventListener("change", function (e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function () { try { loadDoc(JSON.parse(r.result), null); } catch (err) { alert("Not valid JSON: " + err.message); } };
    r.readAsText(f);
    e.target.value = "";
  });
  function syncTabs() {
    document.getElementById("tabJson").classList.toggle("on", state.sideTab === "json");
    document.getElementById("tabValid").classList.toggle("on", state.sideTab === "valid");
  }
  document.getElementById("tabJson").addEventListener("click", function () { state.sideTab = "json"; syncTabs(); updateSide(); });
  document.getElementById("tabValid").addEventListener("click", function () { state.sideTab = "valid"; syncTabs(); updateSide(); });

  var sup = document.getElementById("support");
  if (fsaSupported) { sup.className = "status ok"; sup.textContent = "In-place file save"; }
  else {
    sup.className = "status warn"; sup.textContent = "Download mode";
    var main0 = document.getElementById("main");
  }

  // boot
  state.doc = newDoc();
  render();
  if (!fsaSupported) {
    var note = el("div", { class: "recommend" }, [
      el("span", { html: "&#9432;" }),
      el("span", { html: "This browser can't save files in place. Open in <b>Microsoft Edge</b> or <b>Chrome</b> on desktop for direct save; here, <b>Save</b> downloads a file you re-upload to SharePoint." })
    ]);
    document.getElementById("main").insertBefore(note, document.getElementById("main").firstChild);
  }
})();
</script>
</body>
</html>
