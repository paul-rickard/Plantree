<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Template Inheritance (demo)</title>
<style>
  :root {
    --bg:#f4f6f5; --surface:#fff; --surface-2:#fbfcfb; --ink:#16201e; --muted:#5c6b67; --faint:#8a9995;
    --line:#e0e5e2; --line-strong:#d3dad7; --accent:#0e6e66; --accent-soft:#e4f0ee;
    --good:#1e8e5a; --good-soft:color-mix(in srgb,#1e8e5a 13%,transparent);
    --warn:#b77a12; --warn-soft:color-mix(in srgb,#b77a12 13%,transparent);
    --crit:#c0453b; --info:#3a6ea5; --info-soft:color-mix(in srgb,#3a6ea5 13%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e1613; --surface:#16211d; --surface-2:#131e1a; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6e7e79;
      --line:#26332e; --line-strong:#33433d; --accent:#37b3a4; --accent-soft:#17322e;
      --good:#37b37a; --warn:#d69b3a; --crit:#e0685d; --info:#6c9fd6; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; }
  h1,h2,h3 { margin:0; }
  .mono { font-family:var(--mono); }
  .lbl { font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; font-family:var(--mono); }
  .num { font-variant-numeric:tabular-nums; }

  .top { display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:9px; font-weight:680; font-size:16px; }
  .brand .mark { color:var(--accent); }
  .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .top .desc { color:var(--muted); font-size:12.5px; margin-left:6px; }

  .layout { display:grid; grid-template-columns:240px minmax(0,1fr) 340px; align-items:start; }
  .rail { border-right:1px solid var(--line); background:var(--surface-2); min-height:calc(100vh - 53px); padding:16px 12px; }
  .rail h3 { font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); font-family:var(--mono); margin:0 6px 10px; }
  .node { display:block; width:100%; text-align:left; border:1px solid transparent; background:transparent; border-radius:9px;
    padding:9px 11px; cursor:pointer; margin-bottom:4px; color:var(--ink); font:inherit; }
  .node:hover { background:var(--surface); }
  .node.on { background:var(--surface); border-color:var(--line-strong); box-shadow:0 1px 2px rgba(16,32,28,.05); }
  .node .nt { font-family:var(--mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); }
  .node .nn { font-weight:600; font-size:13.5px; }
  .node .nc { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .node.lvl-model { margin-left:16px; } .node.lvl-instance { margin-left:32px; }
  .tree-line { color:var(--faint); }

  .main { padding:20px; display:flex; flex-direction:column; gap:16px; min-width:0; }
  .side { position:sticky; top:53px; height:calc(100vh - 53px); border-left:1px solid var(--line); background:var(--surface-2); display:flex; flex-direction:column; }
  .side h3 { font-size:12px; padding:14px 16px 6px; margin:0; }
  .side .hint { padding:0 16px 10px; color:var(--muted); font-size:11.5px; }
  .side pre { flex:1; overflow:auto; margin:0; padding:0 16px 16px; font-family:var(--mono); font-size:11px; white-space:pre-wrap; word-break:break-word; }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:12px; }
  .card > h2 { font-size:13.5px; padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .card > h2 .count { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); font-weight:500; }
  .card-body { padding:8px 16px 16px; }

  .nodehead { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .nodehead h1 { font-size:21px; letter-spacing:-.02em; }
  .nodehead .crumb { color:var(--muted); font-size:12.5px; font-family:var(--mono); }
  .banner { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; border-radius:9px; padding:10px 12px; }
  .banner.info { color:var(--info); background:var(--info-soft); border:1px solid color-mix(in srgb,var(--info) 24%,transparent); }
  .banner b { color:var(--ink); }

  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); font-family:var(--mono); font-weight:600; padding:8px 8px; border-bottom:1px solid var(--line); }
  td { padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tr:last-child td { border-bottom:0; }
  input[type=text], input[type=number], select { font:inherit; padding:6px 9px; border:1px solid var(--line-strong); border-radius:7px; background:var(--bg); color:var(--ink); outline:none; width:100%; }
  input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .val-ro { font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .val-ro .u { color:var(--faint); }
  .attr-name { font-weight:560; }
  .attr-name .sub { font-weight:400; color:var(--faint); font-size:11.5px; }

  button.act { font:inherit; font-weight:600; font-size:12px; padding:5px 10px; border-radius:7px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); cursor:pointer; white-space:nowrap; }
  button.act:hover { border-color:var(--faint); }
  button.act.accent { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); }
  button.act.warn { color:var(--warn); }
  button.act.on { background:var(--warn-soft); color:var(--warn); border-color:color-mix(in srgb,var(--warn) 35%,transparent); }
  button.mini { padding:3px 8px; font-size:11.5px; }

  .prov { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:10px; letter-spacing:.03em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:6px; white-space:nowrap; }
  .p-class { color:var(--muted); background:var(--surface-2); border:1px solid var(--line-strong); }
  .p-inherited { color:var(--info); background:var(--info-soft); }
  .p-overridden { color:var(--accent); background:var(--accent-soft); }
  .p-enforced { color:var(--warn); background:var(--warn-soft); }
  .p-added { color:var(--good); background:var(--good-soft); }
  .p-excluded { color:var(--faint); background:var(--surface-2); }

  .task { display:flex; gap:12px; align-items:flex-start; padding:11px 0; border-bottom:1px solid var(--line); }
  .task:last-child { border-bottom:0; }
  .task.excluded .t-instr { text-decoration:line-through; color:var(--faint); }
  .t-main { flex:1; min-width:0; }
  .t-instr { font-weight:540; }
  .t-meta { font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:2px; }
  .t-side { display:flex; align-items:center; gap:8px; }
  .seq { font-family:var(--mono); font-size:11px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:1px 7px; font-weight:700; }
  .addrow { display:flex; gap:8px; margin-top:12px; }
  .addrow input { flex:1; } .addrow select { max-width:130px; }
  .toast { font-size:12px; color:var(--good); font-weight:600; min-height:16px; margin-top:6px; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; padding:2px 2px 0; }
  .legend .prov { cursor:default; }

  @media (max-width:1080px){ .layout{ grid-template-columns:200px minmax(0,1fr);} .side{ display:none; } }
  @media (max-width:720px){ .layout{ grid-template-columns:1fr;} .rail{ min-height:auto; border-right:0; border-bottom:1px solid var(--line);} }
</style>
</head>
<body>
  <div class="top">
    <div class="brand">
      <svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/></svg>
      Plantree <small>· Template Inheritance</small>
    </div>
    <span class="desc">Class → Model → Instance. Attributes inherit downward; override to freeze locally; the class can enforce to lock for everyone.</span>
  </div>

  <div class="layout">
    <aside class="rail">
      <h3>Hierarchy</h3>
      <div id="tree"></div>
      <div class="legend" style="margin-top:16px">
        <span class="prov p-inherited">Inherited</span>
        <span class="prov p-overridden">Overridden</span>
        <span class="prov p-enforced">Enforced</span>
      </div>
    </aside>
    <main class="main" id="main"></main>
    <aside class="side">
      <h3 id="sideTitle">Effective plan</h3>
      <div class="hint" id="sideHint">What this node actually resolves to — the snapshot a work order would freeze.</div>
      <pre id="sideJson"></pre>
    </aside>
  </div>

<script>
(function () {
  "use strict";

  var ATTRS = [
    { key: "frequencyMonths", label: "PM frequency", type: "number", unit: "months" },
    { key: "estimatedLabourHours", label: "Estimated labour", type: "number", unit: "h" },
    { key: "maxImpedanceMilliOhm", label: "Max battery impedance", type: "number", unit: "mΩ", sub: "used by the impedance task" },
    { key: "safety", label: "Safety instruction", type: "text", unit: "" }
  ];
  var LEVELS = ["class", "model", "instance"];

  // ---- seeded hierarchy ----
  var H = {
    class: {
      type: "assetClass", code: "UPS", name: "Uninterruptible Power Supply",
      attrs: {
        frequencyMonths: { value: 6, enforced: false },
        estimatedLabourHours: { value: 1.5, enforced: false },
        maxImpedanceMilliOhm: { value: 5.0, enforced: false },
        safety: { value: "Confirm the UPS is on bypass or a redundant path covers the load before any intrusive check.", enforced: true }
      },
      tasks: [
        { id: "t_input_v", instruction: "Record input voltage (each phase).", responseType: "numeric", unit: "V", enforced: false },
        { id: "t_impedance", instruction: "Measure battery impedance per string.", responseType: "numeric", unit: "mΩ", usesImpedance: true, enforced: true },
        { id: "t_fans", instruction: "Check cooling fans and air filters.", responseType: "passfail", enforced: false },
        { id: "t_log", instruction: "Review event log for alarms.", responseType: "text", enforced: false }
      ]
    },
    model: {
      type: "assetModel", code: "Vertiv EXL-S1", name: "Vertiv Liebert EXL S1", parent: "class",
      overrides: { maxImpedanceMilliOhm: 4.5 },
      exclusions: [],
      addedTasks: [ { id: "t_firmware", instruction: "Verify firmware ≥ 2.4.", responseType: "passfail" } ]
    },
    instance: {
      type: "assetInstance", code: "UPS-A1", name: "UPS-A1", site: "SYD1", parent: "model",
      overrides: { frequencyMonths: 3 },
      exclusions: [],
      addedTasks: []
    }
  };

  var sel = "class";
  var nextId = 1;
  function el(t, p, k) {
    var n = document.createElement(t);
    if (p) Object.keys(p).forEach(function (key) {
      if (key === "class") n.className = p[key];
      else if (key === "html") n.innerHTML = p[key];
      else if (key.slice(0, 2) === "on") n.addEventListener(key.slice(2), p[key]);
      else if (key in n) { try { n[key] = p[key]; } catch (e) { n.setAttribute(key, p[key]); } }
      else n.setAttribute(key, p[key]);
    });
    (k || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return n;
  }
  function idx(l) { return LEVELS.indexOf(l); }

  // ---- resolution ----
  function effAttr(level, key) {
    var cls = H.class.attrs[key];
    if (cls.enforced) return { value: cls.value, origin: "class", state: level === "class" ? "class-enforced" : "enforced" };
    var value = cls.value, origin = "class";
    if (idx(level) >= 1 && (key in H.model.overrides)) { value = H.model.overrides[key]; origin = "model"; }
    if (idx(level) >= 2 && (key in H.instance.overrides)) { value = H.instance.overrides[key]; origin = "instance"; }
    var state = level === "class" ? "class" : (origin === level ? "overridden" : "inherited");
    return { value: value, origin: origin, state: state };
  }
  function canOverride(level, key) { return level !== "class" && !H.class.attrs[key].enforced; }

  function effTasks(level) {
    var out = [];
    H.class.tasks.forEach(function (t) {
      var excluded = false;
      if (!t.enforced) {
        if (idx(level) >= 1 && H.model.exclusions.indexOf(t.id) >= 0) excluded = true;
        if (idx(level) >= 2 && H.instance.exclusions.indexOf(t.id) >= 0) excluded = true;
      }
      out.push({ t: t, origin: "class", enforced: t.enforced, excluded: excluded });
    });
    if (idx(level) >= 1) H.model.addedTasks.forEach(function (t) { out.push({ t: t, origin: "model" }); });
    if (idx(level) >= 2) H.instance.addedTasks.forEach(function (t) { out.push({ t: t, origin: "instance" }); });
    return out;
  }

  function effectivePlan(level) {
    var a = {};
    ATTRS.forEach(function (x) { a[x.key] = effAttr(level, x.key).value; });
    var tasks = effTasks(level).filter(function (r) { return !r.excluded; }).map(function (r, i) {
      var o = { seq: i + 1, instruction: r.t.instruction, responseType: r.t.responseType };
      if (r.t.usesImpedance) { o.unit = "mΩ"; o.acceptableRange = [0, a.maxImpedanceMilliOhm]; }
      else if (r.t.unit) o.unit = r.t.unit;
      return o;
    });
    return { node: H[level].code, level: H[level].type,
      frequencyMonths: a.frequencyMonths, estimatedLabourHours: a.estimatedLabourHours,
      maxImpedanceMilliOhm: a.maxImpedanceMilliOhm, safetyInstructions: a.safety, tasks: tasks };
  }

  // ---- provenance chip ----
  function chip(kind, origin) {
    var map = {
      "class": ["p-class", "Class base"], "class-enforced": ["p-enforced", "🔒 Enforced ↓"],
      "enforced": ["p-enforced", "🔒 Enforced by class"], "overridden": ["p-overridden", "🔒 Overridden here"],
      "inherited": ["p-inherited", "Inherited · " + (origin === "model" ? "model" : "class")],
      "added": ["p-added", "Added here"], "added-up": ["p-inherited", "Added · " + origin], "excluded": ["p-excluded", "Excluded"]
    };
    var m = map[kind] || ["p-class", kind];
    return el("span", { class: "prov " + m[0] }, [m[1]]);
  }

  // ---- render ----
  function render() {
    renderTree();
    var main = document.getElementById("main");
    main.innerHTML = "";
    main.appendChild(nodeHeader());
    main.appendChild(banner());
    main.appendChild(attrCard());
    main.appendChild(taskCard());
    if (sel === "class") main.appendChild(pushDemo());
    renderSide();
  }

  function renderTree() {
    var t = document.getElementById("tree");
    t.innerHTML = "";
    LEVELS.forEach(function (l) {
      var n = H[l];
      t.appendChild(el("button", { class: "node lvl-" + l + (sel === l ? " on" : ""), onclick: function () { sel = l; render(); } }, [
        el("div", { class: "nt" }, [n.type.replace("asset", "")]),
        el("div", { class: "nn" }, [(l !== "class" ? "└ " : "") + n.name]),
        el("div", { class: "nc" }, [n.code + (n.site ? " @ " + n.site : "")])
      ]));
    });
  }

  function nodeHeader() {
    var n = H[sel];
    var crumb = sel === "class" ? "Top of the tree" :
      sel === "model" ? "UPS › Vertiv EXL-S1" : "UPS › Vertiv EXL-S1 › UPS-A1";
    return el("div", { class: "nodehead" }, [
      el("h1", {}, [n.name]),
      el("span", { class: "crumb" }, [crumb + (n.site ? " · site " + n.site : "")])
    ]);
  }

  function banner() {
    var txt;
    if (sel === "class") txt = "This is the <b>template</b>. Edit values here and they flow to every model and instance that hasn't overridden them. Toggle <b>Enforce</b> to lock an attribute so descendants can't diverge.";
    else if (sel === "model") txt = "Inherits from the <b>UPS</b> class. <b>Override</b> an attribute to freeze it for this model (and its instances); <b>enforced</b> rows are locked by the class.";
    else txt = "Inherits from <b>Vertiv EXL-S1</b> (then UPS). Anything not overridden here tracks its parent automatically — change the class and it updates. Overridden rows stay put.";
    return el("div", { class: "banner info" }, [el("span", { html: "&#9432;" }), el("span", { html: txt })]);
  }

  function attrCard() {
    var body = el("tbody", {}, []);
    ATTRS.forEach(function (a) { body.appendChild(attrRow(a)); });
    var table = el("table", {}, [
      el("thead", {}, [el("tr", {}, [
        el("th", { style: "width:32%" }, ["Attribute"]), el("th", { style: "width:26%" }, ["Effective value"]),
        el("th", { style: "width:22%" }, ["Source"]), el("th", { style: "width:20%" }, ["Action"])
      ])]), body
    ]);
    return el("div", { class: "card" }, [el("h2", {}, ["Attributes"]), el("div", { class: "card-body" }, [table])]);
  }

  function fmt(a, v) { return a.type === "number" ? (v + (a.unit ? " " : "")) : v; }

  function attrRow(a) {
    var eff = effAttr(sel, a.key), cls = H.class.attrs[a.key];
    var nameCell = el("td", {}, [el("div", { class: "attr-name" }, [a.label,
      a.sub ? el("div", { class: "sub" }, [a.sub]) : null])]);
    var valueCell = el("td", {}), srcCell = el("td", {}), actCell = el("td", {});

    if (sel === "class") {
      valueCell.appendChild(valueInput(cls, "value", a, function () { renderSide(); }));
      srcCell.appendChild(chip(cls.enforced ? "class-enforced" : "class"));
      var eBtn = el("button", { class: "act mini" + (cls.enforced ? " on" : ""), onclick: function () {
        cls.enforced = !cls.enforced;
        if (cls.enforced) { delete H.model.overrides[a.key]; delete H.instance.overrides[a.key]; }
        render();
      } }, [cls.enforced ? "🔒 Enforced" : "Enforce"]);
      actCell.appendChild(eBtn);
    } else if (cls.enforced) {
      valueCell.appendChild(roVal(a, eff.value));
      srcCell.appendChild(chip("enforced"));
      actCell.appendChild(el("span", { class: "lbl" }, ["locked"]));
    } else if (eff.state === "overridden") {
      valueCell.appendChild(valueInput(H[sel].overrides, a.key, a, function () { renderSide(); }));
      srcCell.appendChild(chip("overridden"));
      actCell.appendChild(el("button", { class: "act mini", onclick: function () { delete H[sel].overrides[a.key]; render(); } }, ["Revert"]));
    } else {
      valueCell.appendChild(roVal(a, eff.value));
      srcCell.appendChild(chip("inherited", eff.origin));
      actCell.appendChild(el("button", { class: "act mini accent", onclick: function () { H[sel].overrides[a.key] = eff.value; render(); } }, ["Override"]));
    }
    return el("tr", {}, [nameCell, valueCell, srcCell, actCell]);
  }

  function roVal(a, v) {
    return el("div", { class: "val-ro" }, [String(v), a.unit ? el("span", { class: "u" }, [" " + a.unit]) : null]);
  }
  function valueInput(obj, key, a, after) {
    var input = el("input", { type: a.type === "number" ? "number" : "text", value: obj[key] == null ? "" : obj[key],
      step: "any" });
    input.addEventListener("input", function () {
      obj[key] = a.type === "number" ? (input.value === "" ? null : Number(input.value)) : input.value;
      if (after) after();
    });
    return input;
  }

  function taskCard() {
    var rows = effTasks(sel);
    var body = el("div", { class: "card-body" }, []);
    var visible = 0;
    rows.forEach(function (r, i) {
      if (!r.excluded) visible++;
      body.appendChild(taskRow(r, visible));
    });
    // add-local-task
    var instr = el("input", { type: "text", placeholder: sel === "class" ? "New class task…" : "Add a task for this " + H[sel].type.replace("asset", "").toLowerCase() + "…" });
    var rt = el("select", {}, ["passfail", "numeric", "text", "none"].map(function (x) { return el("option", { value: x }, [x]); }));
    var add = el("button", { class: "act", onclick: function () {
      var text = instr.value.trim(); if (!text) return;
      var task = { id: "t_" + (nextId++), instruction: text, responseType: rt.value };
      if (sel === "class") H.class.tasks.push(Object.assign(task, { enforced: false }));
      else H[sel].addedTasks.push(task);
      render();
    } }, ["Add"]);
    body.appendChild(el("div", { class: "addrow" }, [instr, rt, add]));
    return el("div", { class: "card" }, [el("h2", {}, ["Tasks", el("span", { class: "count" }, [visible + " effective"])]), body]);
  }

  function taskRow(r, seq) {
    var t = r.t;
    var meta = t.responseType + (t.usesImpedance ? " · 0–" + effAttr(sel, "maxImpedanceMilliOhm").value + " mΩ" : (t.unit ? " · " + t.unit : ""));
    var side = el("div", { class: "t-side" }, []);
    // provenance
    if (r.origin === "class") {
      if (r.enforced) side.appendChild(chip("enforced"));
      else if (r.excluded) side.appendChild(chip("excluded"));
      else side.appendChild(chip("inherited", "class"));
    } else if (r.origin === sel) side.appendChild(chip("added"));
    else side.appendChild(chip("added-up", r.origin));

    // actions
    if (sel === "class" && r.origin === "class") {
      side.appendChild(el("button", { class: "act mini" + (t.enforced ? " on" : ""), onclick: function () { t.enforced = !t.enforced; if (t.enforced) { pull(H.model.exclusions, t.id); pull(H.instance.exclusions, t.id); } render(); } }, [t.enforced ? "🔒" : "Enforce"]));
    } else if (r.origin === "class" && !r.enforced && sel !== "class") {
      side.appendChild(el("button", { class: "act mini", onclick: function () {
        var ex = H[sel].exclusions;
        if (ex.indexOf(t.id) >= 0) pull(ex, t.id); else ex.push(t.id);
        render();
      } }, [r.excluded ? "Include" : "Exclude"]));
    } else if (r.origin === sel && sel !== "class") {
      side.appendChild(el("button", { class: "act mini warn", onclick: function () { pullBy(H[sel].addedTasks, t.id); render(); } }, ["Remove"]));
    } else if (r.origin === "class" && sel === "class") { /* handled */ }
    if (sel === "class" && r.origin === "class") {
      side.appendChild(el("button", { class: "act mini warn", onclick: function () { pullBy(H.class.tasks, t.id); render(); } }, ["Delete"]));
    }

    return el("div", { class: "task" + (r.excluded ? " excluded" : "") }, [
      el("span", { class: "seq" }, [r.excluded ? "—" : String(seq)]),
      el("div", { class: "t-main" }, [el("div", { class: "t-instr" }, [t.instruction]), el("div", { class: "t-meta" }, [meta])]),
      side
    ]);
  }

  function pushDemo() {
    var toast = el("div", { class: "toast", id: "pushToast" }, []);
    var b = el("div", { class: "card-body" }, [
      el("div", { style: "font-size:12.5px;color:var(--muted);margin-bottom:10px" }, ["Because instances derive from the class at read time, a class change flows downstream automatically — except where a descendant has overridden or you've enforced. Try it:"]),
      el("div", { class: "addrow" }, [
        el("button", { class: "act accent", onclick: function () {
          if (!H.class.tasks.some(function (x) { return x.id === "t_earth"; }))
            H.class.tasks.push({ id: "t_earth", instruction: "Check earth bonding continuity.", responseType: "passfail", enforced: false });
          flash("Added to UPS class → now inherited by Vertiv EXL-S1 and UPS-A1. Open those nodes to see it appear.");
        } }, ["+ Add class task “Check earth bonding”"]),
        el("button", { class: "act", onclick: function () { H.class.attrs.frequencyMonths.value = 12; flash("Class frequency → 12 mo. Model now shows 12; UPS-A1 stays 3 (overridden)."); } }, ["Set class frequency = 12"])
      ]),
      toast
    ]);
    return el("div", { class: "card" }, [el("h2", {}, ["Propagation demo"]), b]);
  }
  function flash(msg) { render(); var t = document.getElementById("pushToast"); if (t) t.textContent = msg; }

  function pull(arr, id) { var i = arr.indexOf(id); if (i >= 0) arr.splice(i, 1); }
  function pullBy(arr, id) { for (var i = 0; i < arr.length; i++) if (arr[i].id === id) { arr.splice(i, 1); return; } }

  function renderSide() {
    document.getElementById("sideTitle").textContent = "Effective plan · " + H[sel].code;
    document.getElementById("sideJson").textContent = JSON.stringify(effectivePlan(sel), null, 2);
  }

  render();
})();
</script>
</body>
</html>
