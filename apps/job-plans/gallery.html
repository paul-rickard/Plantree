<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Job Plan Gallery</title>
<style>
  :root {
    --bg:#f4f6f5; --surface:#fff; --surface-2:#fbfcfb; --ink:#16201e; --muted:#5c6b67; --faint:#8a9995;
    --line:#e0e5e2; --line-strong:#d3dad7; --accent:#0e6e66; --accent-soft:#e4f0ee;
    --good:#1e8e5a; --good-soft:color-mix(in srgb,#1e8e5a 13%,transparent);
    --warn:#b77a12; --warn-soft:color-mix(in srgb,#b77a12 13%,transparent);
    --crit:#c0453b; --info:#3a6ea5; --info-soft:color-mix(in srgb,#3a6ea5 12%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e1613; --surface:#16211d; --surface-2:#131e1a; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6e7e79;
      --line:#26332e; --line-strong:#33433d; --accent:#37b3a4; --accent-soft:#17322e; --good:#37b37a; --warn:#d69b3a; --crit:#e0685d; --info:#6c9fd6; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; }
  h1,h2,h3 { margin:0; } .mono { font-family:var(--mono); } .num { font-variant-numeric:tabular-nums; }
  .lbl { font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; font-family:var(--mono); }

  .top { display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:9px; font-weight:680; font-size:16px; }
  .brand .mark { color:var(--accent); } .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .top .actions { display:flex; gap:8px; margin-left:6px; flex-wrap:wrap; }
  .top .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  button.btn { font:inherit; font-weight:600; font-size:13px; padding:7px 13px; border-radius:8px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); cursor:pointer; }
  button.btn:hover { border-color:var(--faint); }
  button.btn.primary { background:var(--accent); color:#fff; border-color:transparent; }
  button.btn.primary:hover { filter:brightness(1.08); }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
  .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:var(--good-soft); } .status.warn { color:var(--warn); background:var(--warn-soft); }

  .controls { display:flex; align-items:center; gap:12px; padding:14px 20px; flex-wrap:wrap; }
  .search { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line-strong); border-radius:9px; padding:7px 11px; width:min(340px,60vw); }
  .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .search input { border:0; background:transparent; outline:none; color:var(--ink); font:inherit; width:100%; }
  select { font:inherit; padding:7px 10px; border:1px solid var(--line-strong); border-radius:8px; background:var(--surface); color:var(--ink); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .fchip { font:inherit; font-size:12px; font-weight:600; padding:5px 11px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--muted); cursor:pointer; }
  .fchip.on { background:var(--accent-soft); color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); }
  .count { margin-left:auto; color:var(--faint); font-size:12.5px; font-family:var(--mono); }

  .grid { padding:6px 20px 40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; cursor:pointer; display:flex; flex-direction:column; gap:11px; transition:border-color .12s, box-shadow .12s, transform .06s; }
  .card:hover { border-color:var(--line-strong); box-shadow:0 6px 20px rgba(16,32,28,.06); transform:translateY(-1px); }
  .card .chead { display:flex; align-items:flex-start; gap:10px; }
  .card .title { font-weight:660; font-size:15px; letter-spacing:-.01em; line-height:1.25; }
  .card .code { font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:2px; }
  .badge { font-family:var(--mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:5px; white-space:nowrap; }
  .b-draft { color:var(--muted); background:var(--surface-2); border:1px solid var(--line-strong); }
  .b-approved { color:var(--info); background:var(--info-soft); }
  .b-active { color:var(--good); background:var(--good-soft); }
  .b-superseded { color:var(--faint); background:var(--surface-2); }
  .b-retired { color:var(--crit); background:color-mix(in srgb,var(--crit) 12%,transparent); }
  .desc { font-size:12.5px; color:var(--muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:34px; }
  .freqs { display:flex; gap:5px; flex-wrap:wrap; }
  .freq { font-family:var(--mono); font-size:10px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:2px 7px; }
  .freq.none { color:var(--faint); background:var(--surface-2); }
  .meta { display:flex; gap:14px; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:11px; font-size:12px; color:var(--muted); }
  .meta b { color:var(--ink); font-variant-numeric:tabular-nums; font-family:var(--mono); }
  .src { margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--faint); }

  /* grouped tree */
  .tree { padding:6px 20px 40px; display:flex; flex-direction:column; gap:10px; }
  .grp { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--surface); }
  .grp-head { width:100%; display:flex; align-items:center; gap:10px; padding:12px 15px; background:var(--surface-2); border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--ink); text-align:left; }
  .grp-head:hover { background:color-mix(in srgb,var(--accent) 5%,var(--surface-2)); }
  .grp-name { font-weight:680; font-size:15px; letter-spacing:-.01em; }
  .grp-meta { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .grp-body { display:flex; flex-direction:column; }
  .caret { color:var(--faint); transition:transform .12s; flex:none; }
  .caret.open { transform:rotate(90deg); }
  .sub-head { width:100%; display:flex; align-items:center; gap:9px; padding:8px 15px 8px 26px; background:transparent; border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--muted); text-align:left; }
  .sub-head:hover { color:var(--ink); }
  .sub-name { font-weight:620; font-size:12.5px; font-family:var(--mono); color:var(--ink); }
  .plan-row { width:100%; display:flex; align-items:center; gap:12px; padding:11px 15px; background:transparent; border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--ink); text-align:left; }
  .plan-row.ind { padding-left:44px; }
  .plan-row:last-child { border-bottom:0; }
  .plan-row:hover { background:var(--surface-2); }
  .pr-name { font-weight:600; font-size:13.5px; }
  .pr-code { font-family:var(--mono); font-size:11px; color:var(--faint); }
  .pr-freqs { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .pr-tasks { font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap; min-width:60px; text-align:right; }
  @media (max-width:640px){ .pr-freqs { display:none; } }

  .empty { padding:60px 20px; text-align:center; color:var(--muted); }
  .empty .big { font-size:16px; color:var(--ink); font-weight:600; margin-bottom:6px; }
  .recommend { display:inline-flex; gap:8px; align-items:flex-start; text-align:left; max-width:520px; margin:14px auto 0; font-size:12.5px; color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent); border-radius:9px; padding:10px 12px; }
  .recommend b { color:var(--ink); }

  /* modal */
  .overlay { position:fixed; inset:0; background:rgba(16,32,28,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:50; overflow:auto; }
  .modal { background:var(--surface); border:1px solid var(--line); border-radius:16px; width:min(680px,100%); box-shadow:0 20px 60px rgba(0,0,0,.3); }
  .modal .mh { display:flex; align-items:flex-start; gap:12px; padding:18px 20px; border-bottom:1px solid var(--line); }
  .modal .mh .title { font-size:18px; font-weight:680; letter-spacing:-.01em; }
  .modal .mh .code { font-family:var(--mono); font-size:12px; color:var(--faint); }
  .modal .mb { padding:18px 20px; display:flex; flex-direction:column; gap:16px; }
  .modal .close { margin-left:auto; }
  .vsel { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .mtask { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:1px solid var(--line); }
  .mtask:last-child { border-bottom:0; }
  .mtask .seq { font-family:var(--mono); font-size:11px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:1px 7px; }
  .mtask .ti { font-size:13px; } .mtask .tt { font-family:var(--mono); font-size:10px; color:var(--faint); }
  .mtask .tf { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; }
  .kv { display:flex; gap:22px; flex-wrap:wrap; font-size:12.5px; color:var(--muted); }
  .kv b { color:var(--ink); }
  .dropzone.drag { outline:2px dashed var(--accent); outline-offset:-10px; }
</style>
</head>
<body class="dropzone" id="body">
  <div class="top">
    <div class="brand">
      <svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/></svg>
      Plantree <small>· Job Plan Gallery</small>
    </div>
    <div class="actions">
      <button class="btn primary" id="openFolder">Open folder…</button>
      <button class="btn" id="chooseFiles">Choose files…</button>
      <button class="btn" id="loadSamples">Load samples</button>
    </div>
    <div class="right"><span id="support" class="status warn">checking…</span></div>
  </div>

  <div class="controls">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--faint)"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg>
      <input id="q" placeholder="Search name, code or description…" />
    </div>
    <div class="chips" id="viewToggle">
      <button class="fchip on" data-view="grouped">By class</button>
      <button class="fchip" data-view="grid">Grid</button>
    </div>
    <div class="chips" id="stateChips"></div>
    <span id="sortWrap" style="display:inline-flex;align-items:center;gap:8px"><label class="lbl" for="sort">Sort</label>
    <select id="sort">
      <option value="name">Name</option>
      <option value="code">Code</option>
      <option value="updated">Updated</option>
      <option value="tasks">Tasks</option>
    </select></span>
    <span class="count" id="count"></span>
  </div>

  <div id="view"></div>
  <input type="file" id="fileInput" accept=".json" multiple hidden />

<script>
(function () {
  "use strict";
  var UNIT = { day: ["Daily", "d"], week: ["Weekly", "w"], month: ["Monthly", "mo"], year: ["Annual", "y"] };
  function freqLabel(f) {
    if (f.label) return f.label;
    if (f.interval === 1) return UNIT[f.unit][0];
    if (f.unit === "month") return f.interval + "-Monthly";
    if (f.unit === "year") return f.interval + "-Yearly";
    return "Every " + f.interval + " " + f.unit + "s";
  }
  function el(t, p, k) {
    var n = document.createElement(t);
    if (p) Object.keys(p).forEach(function (key) {
      if (key === "class") n.className = p[key];
      else if (key === "html") n.innerHTML = p[key];
      else if (key.slice(0, 2) === "on") n.addEventListener(key.slice(2), p[key]);
      else if (key in n) { try { n[key] = p[key]; } catch (e) { n.setAttribute(key, p[key]); } }
      else n.setAttribute(key, p[key]);
    });
    (k || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return n;
  }
  function activeVersion(plan) {
    var vs = plan.versions || [];
    var a = vs.filter(function (v) { return v.version === plan.activeVersion; })[0];
    if (a) return a;
    a = vs.filter(function (v) { return v.lifecycleState === "active"; })[0];
    if (a) return a;
    return vs.slice().sort(function (x, y) { return (y.version || 0) - (x.version || 0); })[0] || { tasks: [] };
  }
  function fmtDate(s) { if (!s) return "—"; return String(s).slice(0, 10); }

  var STATES = ["active", "approved", "draft", "superseded", "retired"];
  var fsaSupported = typeof window.showDirectoryPicker === "function";

  var store = [];          // {plan, source}
  var q = "", sort = "name", stateFilter = "all", usingSamples = true;
  var viewMode = "grouped", collapsed = {};

  // ---------- seed samples ----------
  function T(instruction, responseType, frequencyIds) { return { instruction: instruction, responseType: responseType, frequencyIds: frequencyIds || [] }; }
  function P(o) { return o; }
  var SAMPLES = [
    { id: "jp_ups_quarterly_inspection", type: "jobPlan", code: "JP-UPS-QTR", name: "Quarterly UPS Inspection",
      assetClass: "UPS", assetModel: "Schneider Galaxy VX",
      description: "Routine quarterly inspection for static UPS units; parameterised on battery-string count.", updatedAt: "2026-06-18",
      activeVersion: 4, versions: [{ version: 4, lifecycleState: "active", estimatedLabourHours: 1.5,
        frequencies: [{ id: "q", label: "Quarterly", unit: "month", interval: 3 }],
        tasks: [T("Record input voltage.", "numeric", ["q"]), T("Record output voltage.", "numeric", ["q"]), T("Battery impedance per string.", "numeric", ["q"]), T("Check fans & filters.", "passfail", ["q"]), T("Review event log.", "text", ["q"]), T("Overall condition.", "choice", ["q"])] }] },
    { id: "jp_ups_battery_load", type: "jobPlan", code: "JP-UPS-BAT", name: "Annual UPS Battery Load Test",
      assetClass: "UPS",
      description: "Timed discharge / capacity test of the UPS battery string.", updatedAt: "2026-04-11",
      activeVersion: 1, versions: [{ version: 1, lifecycleState: "active", estimatedLabourHours: 3,
        frequencies: [{ id: "y", unit: "year", interval: 1 }],
        tasks: [T("Record float voltage per cell.", "numeric", ["y"]), T("Run timed discharge to end voltage.", "numeric", ["y"]), T("Log runtime vs rated.", "numeric", ["y"])] }] },
    { id: "jp_generator_maintenance", type: "jobPlan", code: "JP-GEN-STD", name: "Standby Generator Maintenance",
      assetClass: "Generator", assetModel: "Caterpillar 3512",
      description: "Full programme for standby diesel generators — every cadence in one plan via the task × frequency matrix.", updatedAt: "2026-06-01",
      activeVersion: 1, versions: [{ version: 1, lifecycleState: "active", estimatedLabourHours: 3,
        frequencies: [{ id: "w", unit: "week", interval: 1 }, { id: "m", unit: "month", interval: 1 }, { id: "s", unit: "month", interval: 6 }, { id: "y", unit: "year", interval: 1 }],
        tasks: [T("Visual inspection.", "passfail", ["w"]), T("Check coolant & oil.", "passfail", ["w", "m"]), T("Check battery.", "numeric", ["w", "m"]), T("No-load test run.", "passfail", ["m"]), T("Change oil & filter.", "passfail", ["s"]), T("Replace fuel/air filters.", "passfail", ["s"]), T("Full-load test.", "numeric", ["y"]), T("Fuel polishing.", "passfail", ["s", "y"])] }] },
    { id: "jp_generator_fuel", type: "jobPlan", code: "JP-GEN-FUEL", name: "Generator Fuel System Service",
      assetClass: "Generator", assetModel: "Caterpillar 3512",
      description: "Fuel filters, injectors and tank water management.", updatedAt: "2026-03-22",
      activeVersion: 2, versions: [{ version: 2, lifecycleState: "active", estimatedLabourHours: 2,
        frequencies: [{ id: "s", label: "6-Monthly", unit: "month", interval: 6 }],
        tasks: [T("Replace primary/secondary fuel filters.", "passfail", ["s"]), T("Drain tank water trap.", "passfail", ["s"]), T("Sample fuel for analysis.", "numeric", ["s"])] }] },
    { id: "jp_chiller_annual", type: "jobPlan", code: "JP-CHW-ANN", name: "Chiller Annual Service",
      assetClass: "Chiller",
      description: "Annual major service for water-cooled centrifugal chillers.", updatedAt: "2026-05-20",
      activeVersion: 2, versions: [{ version: 2, lifecycleState: "active", estimatedLabourHours: 8,
        frequencies: [{ id: "y", unit: "year", interval: 1 }],
        tasks: [T("Eddy-current tube test.", "passfail", ["y"]), T("Oil analysis.", "numeric", ["y"]), T("Refrigerant charge check.", "numeric", ["y"]), T("Calibrate controls.", "passfail", ["y"]), T("Megger motor windings.", "numeric", ["y"])] }] },
    { id: "jp_chiller_weekly", type: "jobPlan", code: "JP-CHW-WK", name: "Chiller Weekly Log",
      assetClass: "Chiller",
      description: "Operator weekly readings and visual check.", updatedAt: "2026-07-05",
      activeVersion: 1, versions: [{ version: 1, lifecycleState: "active", estimatedLabourHours: 0.25,
        frequencies: [{ id: "w", unit: "week", interval: 1 }],
        tasks: [T("Record condenser/evaporator temps.", "numeric", ["w"]), T("Record approach & pressures.", "numeric", ["w"]), T("Check for leaks/alarms.", "passfail", ["w"])] }] },
    { id: "jp_crah_filter", type: "jobPlan", code: "JP-CRAH-FLT", name: "CRAH Filter & Belt Check",
      assetClass: "CRAH",
      description: "Monthly filter and belt inspection for computer-room air handlers; run as a route.", updatedAt: "2026-07-02",
      activeVersion: 3, versions: [{ version: 3, lifecycleState: "active", estimatedLabourHours: 0.5,
        frequencies: [{ id: "m", unit: "month", interval: 1 }],
        tasks: [T("Inspect / replace filters.", "passfail", ["m"]), T("Check belt tension.", "passfail", ["m"]), T("Record supply/return temps.", "numeric", ["m"])] }] },
    { id: "jp_firepump_weekly", type: "jobPlan", code: "JP-FP-WK", name: "Fire Pump Weekly Test",
      assetClass: "Fire Pump",
      description: "Statutory weekly no-flow (churn) test for electric fire pumps.", updatedAt: "2026-07-06",
      activeVersion: 1, versions: [{ version: 1, lifecycleState: "active", estimatedLabourHours: 0.5,
        frequencies: [{ id: "w", unit: "week", interval: 1 }],
        tasks: [T("Start pump, run 10 min.", "passfail", ["w"]), T("Record suction/discharge pressure.", "numeric", ["w"]), T("Check packing gland leakage.", "passfail", ["w"]), T("Confirm auto-start.", "passfail", ["w"])] }] },
    { id: "jp_thermo_survey", type: "jobPlan", code: "JP-THERMO", name: "Thermographic Survey",
      assetClass: "Switchboard",
      description: "Infrared survey of switchboards and distribution — draft, pending approval.", updatedAt: "2026-07-09",
      activeVersion: null, versions: [{ version: 1, lifecycleState: "draft", estimatedLabourHours: 4,
        frequencies: [{ id: "y", unit: "year", interval: 1 }],
        tasks: [T("Scan main switchboard under load.", "numeric", ["y"]), T("Scan distribution boards.", "numeric", ["y"]), T("Log & flag hotspots > 60°C.", "text", ["y"])] }] }
  ];

  // ---------- render ----------
  function setSamples() { store = SAMPLES.map(function (p) { return { plan: p, source: "sample" }; }); usingSamples = true; render(); }
  function setLoaded(list) {
    if (!list.length) { alert("No job-plan JSON files found (expects files with \"type\": \"jobPlan\")."); return; }
    store = list; usingSamples = false; render();
  }

  function filtered() {
    return store.filter(function (e) {
      var p = e.plan, av = activeVersion(p);
      if (stateFilter !== "all" && av.lifecycleState !== stateFilter) return false;
      if (!q) return true;
      var hay = (p.name + " " + p.code + " " + (p.description || "") + " " + (p.assetClass || "") + " " + (p.assetModel || "")).toLowerCase();
      return hay.indexOf(q.toLowerCase()) >= 0;
    });
  }
  function byName(a, b) { return a.plan.name.localeCompare(b.plan.name); }
  function render() {
    renderStateChips();
    syncViewToggle();
    var list = filtered();
    document.getElementById("count").textContent = list.length + " of " + store.length + " plan" + (store.length === 1 ? "" : "s") + (usingSamples ? " · samples" : "");
    document.getElementById("sortWrap").style.display = viewMode === "grid" ? "" : "none";
    var view = document.getElementById("view");
    view.innerHTML = "";
    if (!list.length) { view.appendChild(emptyState()); return; }
    if (viewMode === "grouped") view.appendChild(groupedTree(list));
    else {
      list.sort(function (a, b) {
        var pa = a.plan, pb = b.plan;
        if (sort === "name") return pa.name.localeCompare(pb.name);
        if (sort === "code") return pa.code.localeCompare(pb.code);
        if (sort === "updated") return String(pb.updatedAt || "").localeCompare(String(pa.updatedAt || ""));
        if (sort === "tasks") return activeVersion(pb).tasks.length - activeVersion(pa).tasks.length;
        return 0;
      });
      view.appendChild(el("div", { class: "grid" }, list.map(card)));
    }
  }
  function syncViewToggle() {
    var host = document.getElementById("viewToggle");
    Array.prototype.forEach.call(host.querySelectorAll("button"), function (b) { b.classList.toggle("on", b.getAttribute("data-view") === viewMode); });
  }

  // ---------- grouped (Class -> [Model] -> Plans), alphabetical ----------
  function groupBy(list, keyFn) {
    var m = {};
    list.forEach(function (e) { var k = keyFn(e); (m[k] = m[k] || []).push(e); });
    return m;
  }
  function taskTotal(entries) { return entries.reduce(function (s, e) { return s + activeVersion(e.plan).tasks.length; }, 0); }
  function groupedTree(list) {
    var wrap = el("div", { class: "tree" }, []);
    var byClass = groupBy(list, function (e) { return e.plan.assetClass || "Unclassified"; });
    Object.keys(byClass).sort(function (a, b) { return a.localeCompare(b); }).forEach(function (cls) {
      var entries = byClass[cls];
      var key = "class:" + cls, open = !collapsed[key];
      var head = el("button", { class: "grp-head", onclick: function () { collapsed[key] = open; render(); } }, [
        caret(open), el("span", { class: "grp-name" }, [cls]),
        el("span", { class: "grp-meta" }, [entries.length + " plan" + (entries.length === 1 ? "" : "s") + " · " + taskTotal(entries) + " tasks"])
      ]);
      var body = el("div", { class: "grp-body" }, []);
      if (open) {
        var hasModel = entries.some(function (e) { return e.plan.assetModel; });
        if (hasModel) {
          var byModel = groupBy(entries, function (e) { return e.plan.assetModel || "General"; });
          Object.keys(byModel).sort(function (a, b) { return a.localeCompare(b); }).forEach(function (mdl) {
            var mEntries = byModel[mdl].slice().sort(byName), mkey = "model:" + cls + ":" + mdl, mopen = !collapsed[mkey];
            body.appendChild(el("button", { class: "sub-head", onclick: function () { collapsed[mkey] = mopen; render(); } }, [
              caret(mopen), el("span", { class: "sub-name" }, [mdl]), el("span", { class: "grp-meta" }, [mEntries.length + ""])
            ]));
            if (mopen) mEntries.forEach(function (e) { body.appendChild(planRow(e, true)); });
          });
        } else {
          entries.slice().sort(byName).forEach(function (e) { body.appendChild(planRow(e, false)); });
        }

    return wrap;
  }
  function caret(open) {

  }
  function planRow(e, indented) {

      el("span", { class: "badge b-" + (av.lifecycleState || "draft") }, [av.lifecycleState || "draft"]),
      el("span", { class: "pr-name" }, [p.name]),
      el("span", { class: "pr-code" }, [p.code]),
      el("span", { class: "pr-freqs" }, freqs.length ? freqs.map(function (f) { return el("span", { class: "freq" }, [freqLabel(f)]); }) : [el("span", { class: "freq none" }, ["ad hoc"])]),
      el("span", { class: "pr-tasks num" }, [av.tasks.length + " tasks"])
    ]);
  }
  function renderStateChips() {
    var host = document.getElementById("stateChips"); host.innerHTML = "";
    var opts = [["all", "All"]].concat(STATES.map(function (s) { return [s, s[0].toUpperCase() + s.slice(1)]; }));
    opts.forEach(function (o) {
      var n = o[0] === "all" ? store.length : store.filter(function (e) { return activeVersion(e.plan).lifecycleState === o[0]; }).length;
      if (o[0] !== "all" && n === 0) return;
      host.appendChild(el("button", { class: "fchip" + (stateFilter === o[0] ? " on" : ""), onclick: function () { stateFilter = o[0]; render(); } }, [o[1] + " · " + n]));
    });
  }
  function card(e) {
    var p = e.plan, av = activeVersion(p), freqs = av.frequencies || [];
    var head = el("div", { class: "chead" }, [
      el("div", {}, [el("div", { class: "title" }, [p.name]), el("div", { class: "code" }, [p.code])]),
      el("span", { class: "badge b-" + (av.lifecycleState || "draft"), style: "margin-left:auto" }, [av.lifecycleState || "draft"])
    ]);
    var freqRow = el("div", { class: "freqs" }, freqs.length
      ? freqs.map(function (f) { return el("span", { class: "freq" }, [freqLabel(f)]); })
      : [el("span", { class: "freq none" }, ["ad hoc"])]);
    var meta = el("div", { class: "meta" }, [
      el("span", {}, [el("b", {}, [String(av.tasks.length)]), " tasks"]),
      el("span", {}, ["v", el("b", {}, [String(av.version || 1)]), " · ", el("b", {}, [String((p.versions || []).length)]), " ver"]),
      av.estimatedLabourHours != null ? el("span", {}, [el("b", {}, [String(av.estimatedLabourHours)]), " h"]) : null,
      el("span", { class: "src" }, [e.source === "sample" ? "sample" : (e.source || "")])
    ]);
    return el("div", { class: "card", onclick: function () { openModal(p); } }, [
      head,
      el("div", { class: "desc" }, [p.description || ""]),
      freqRow,
      el("div", { class: "meta", style: "border:0;padding:0;color:var(--faint)" }, [el("span", {}, ["Updated " + fmtDate(p.updatedAt)])]),
      meta
    ]);
  }
  function emptyState() {
    var kids = [el("div", { class: "big" }, [q || stateFilter !== "all" ? "No plans match." : "No job plans loaded."]),
      el("div", {}, [q || stateFilter !== "all" ? "Try clearing the search or filter." : "Open a folder of job-plan JSON files, choose files, or load the samples."])];
    if (!fsaSupported) kids.push(el("div", { class: "recommend" }, [el("span", { html: "&#9432;" }),
      el("span", { html: "Folder open needs the File System Access API — use <b>Microsoft Edge</b> or <b>Chrome</b> on desktop. Here you can still <b>Choose files</b> or drag JSON files onto the window." })]));
    return el("div", { class: "empty" }, kids);
  }

  // ---------- detail modal ----------
  var modalState = { plan: null, vi: 0 };
  function openModal(plan) { modalState = { plan: plan, vi: activeIndex(plan) }; renderModal(); }
  function activeIndex(plan) {
    var vs = plan.versions || [], i = vs.findIndex(function (v) { return v.version === plan.activeVersion; });
    if (i >= 0) return i; i = vs.findIndex(function (v) { return v.lifecycleState === "active"; }); return i >= 0 ? i : 0;
  }
  function closeModal() { var o = document.getElementById("ovl"); if (o) o.remove(); }
  function renderModal() {
    closeModal();
    var plan = modalState.plan, vs = plan.versions || [], v = vs[modalState.vi] || { tasks: [] };
    var vsel = el("div", { class: "vsel" }, [el("span", { class: "lbl" }, ["Version"]),
      el("select", { onchange: function (ev) { modalState.vi = Number(ev.target.value); renderModal(); } },
        vs.map(function (ver, i) { return el("option", { value: i, selected: i === modalState.vi }, ["v" + ver.version + " · " + ver.lifecycleState]); })),
      el("span", { class: "badge b-" + (v.lifecycleState || "draft") }, [v.lifecycleState || "draft"])]);
    var kv = el("div", { class: "kv" }, [
      el("span", {}, ["Tasks ", el("b", {}, [String(v.tasks.length)])]),
      v.estimatedLabourHours != null ? el("span", {}, ["Labour ", el("b", {}, [v.estimatedLabourHours + " h"])]) : null,
      el("span", {}, ["Updated ", el("b", {}, [fmtDate(plan.updatedAt)])])
    ]);
    var freqs = v.frequencies || [];
    var freqRow = freqs.length ? el("div", { class: "freqs" }, freqs.map(function (f) { return el("span", { class: "freq" }, [freqLabel(f)]); })) : null;
    var tasks = el("div", {}, (v.tasks || []).map(function (t, i) {
      var tags = (t.frequencyIds || []).map(function (id) { var f = freqs.filter(function (x) { return x.id === id; })[0]; return el("span", { class: "freq" }, [f ? freqLabel(f) : id]); });
      return el("div", { class: "mtask" }, [el("span", { class: "seq" }, [String(i + 1)]),
        el("div", {}, [el("div", { class: "ti" }, [t.instruction]), el("div", { class: "tt" }, [t.responseType])]),
        el("div", { class: "tf" }, tags)]);
    }));
    var modal = el("div", { class: "modal", onclick: function (e) { e.stopPropagation(); } }, [
      el("div", { class: "mh" }, [
        el("div", {}, [el("div", { class: "title" }, [plan.name]), el("div", { class: "code" }, [plan.code])]),
        el("button", { class: "btn close", onclick: closeModal }, ["✕"])
      ]),
      el("div", { class: "mb" }, [
        plan.description ? el("div", { style: "font-size:13px;color:var(--muted)" }, [plan.description]) : null,
        vsel, kv, freqRow,
        el("div", {}, [el("div", { class: "lbl", style: "margin-bottom:6px" }, ["Tasks"]), tasks]),
        el("div", {}, [el("button", { class: "btn", onclick: function () { downloadPlan(plan); } }, ["Download JSON"])])
      ])
    ]);
    var ovl = el("div", { class: "overlay", id: "ovl", onclick: closeModal }, [modal]);
    document.body.appendChild(ovl);
  }
  function downloadPlan(plan) {
    var blob = new Blob([JSON.stringify(plan, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = el("a", { href: url, download: (plan.id || plan.code || "job-plan") + ".json" });
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  }

  // ---------- loading ----------
  async function walk(dir, out, depth) {
    if (depth > 6) return;
    for await (var entry of dir.values()) {
      if (entry.kind === "file" && entry.name.toLowerCase().endsWith(".json")) {
        try { var f = await entry.getFile(); var obj = JSON.parse(await f.text()); if (obj && obj.type === "jobPlan") out.push({ plan: obj, source: entry.name }); } catch (e) {}
      } else if (entry.kind === "directory") { await walk(entry, out, depth + 1); }
    }
  }
  async function openFolder() {
    try { var dir = await window.showDirectoryPicker(); var out = []; await walk(dir, out, 0); setLoaded(out); }
    catch (e) { if (e.name !== "AbortError") alert("Could not open folder: " + e.message); }
  }
  function readFiles(fileList) {
    var files = Array.prototype.slice.call(fileList).filter(function (f) { return f.name.toLowerCase().endsWith(".json"); });

      var r = new FileReader();
      r.onload = function () { try { var o = JSON.parse(r.result); if (o && o.type === "jobPlan") out.push({ plan: o, source: f.name }); } catch (e) {} finally { if (--pending === 0) setLoaded(out); } };
      r.onerror = function () { if (--pending === 0) setLoaded(out); };
      r.readAsText(f);
    });
  }

  // ---------- wire ----------
  document.getElementById("openFolder").addEventListener("click", openFolder);
  document.getElementById("chooseFiles").addEventListener("click", function () { document.getElementById("fileInput").click(); });
  document.getElementById("loadSamples").addEventListener("click", setSamples);
  document.getElementById("fileInput").addEventListener("change", function (e) { readFiles(e.target.files); e.target.value = ""; });
  document.getElementById("q").addEventListener("input", function (e) { q = e.target.value; render(); });
  document.getElementById("sort").addEventListener("change", function (e) { sort = e.target.value; render(); });
  Array.prototype.forEach.call(document.getElementById("viewToggle").querySelectorAll("button"), function (b) {
    b.addEventListener("click", function () { viewMode = b.getAttribute("data-view"); render(); });
  });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeModal(); });
  var body = document.getElementById("body");
  ["dragenter", "dragover"].forEach(function (ev) { body.addEventListener(ev, function (e) { e.preventDefault(); body.classList.add("drag"); }); });
  ["dragleave", "drop"].forEach(function (ev) { body.addEventListener(ev, function (e) { e.preventDefault(); if (ev === "dragleave" && e.relatedTarget) return; body.classList.remove("drag"); }); });
  body.addEventListener("drop", function (e) { if (e.dataTransfer && e.dataTransfer.files.length) readFiles(e.dataTransfer.files); });

  var sup = document.getElementById("support");
  if (fsaSupported) { sup.className = "status ok"; sup.textContent = "Folder access"; }
  else { sup.className = "status warn"; sup.textContent = "Files / drag-drop"; }

  setSamples();
})();
