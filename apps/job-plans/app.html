<html lang="en">
<head>
<meta charset="utf-8" />

<title>Plantree — Job Plans</title>
<style>
  :root {

    --warn:#b3760f; --warn-soft:color-mix(in srgb,#b3760f 14%,transparent);
    --crit:#c0453b; --crit-soft:color-mix(in srgb,#c0453b 12%,transparent);

    --sh:0 1px 2px rgba(16,32,28,.05); --sh-2:0 8px 30px rgba(16,32,28,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d1512; --panel:#141f1b; --panel-2:#111b17; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6c7d77;
      --line:#25322d; --line-2:#33433d; --accent:#38b4a4; --accent-h:#54c6b7; --accent-soft:#16302c;
      --good:#37b37a; --good-soft:color-mix(in srgb,#37b37a 16%,transparent);
      --warn:#d69b3a; --warn-soft:color-mix(in srgb,#d69b3a 15%,transparent);
      --crit:#e0685d; --crit-soft:color-mix(in srgb,#e0685d 15%,transparent);
      --info:#6c9fd6; --info-soft:color-mix(in srgb,#6c9fd6 15%,transparent); --sh-2:0 10px 34px rgba(0,0,0,.4); }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; overflow:hidden; -webkit-font-smoothing:antialiased; }
  h1,h2,h3 { margin:0; } .mono { font-family:var(--mono); } .num { font-variant-numeric:tabular-nums; }
  .lbl { font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); font-weight:700; font-family:var(--mono); }

  button { font:inherit; cursor:pointer; }
  .btn { font-weight:600; font-size:13px; padding:7px 13px; border-radius:9px; border:1px solid var(--line-2); background:var(--panel); color:var(--ink); display:inline-flex; align-items:center; gap:7px; transition:border-color .12s, background .12s, color .12s; white-space:nowrap; }
  .btn:hover { border-color:var(--faint); }
  .btn.primary { background:var(--accent); color:#fff; border-color:transparent; } .btn.primary:hover { background:var(--accent-h); }
  .btn.ghost { border-color:transparent; background:transparent; color:var(--muted); } .btn.ghost:hover { background:var(--panel-2); color:var(--ink); }
  .btn.sm { padding:5px 10px; font-size:12px; border-radius:8px; }
  .btn.danger { color:var(--crit); } .btn:disabled { opacity:.4; cursor:not-allowed; }
  .icon { width:34px; height:34px; padding:0; justify-content:center; }
  .x { border:0; background:transparent; color:var(--faint); padding:2px 5px; border-radius:6px; font-size:13px; } .x:hover { color:var(--crit); background:var(--crit-soft); }

  input[type=text],input[type=number],textarea,select { font:inherit; padding:8px 10px; border:1px solid var(--line-2); border-radius:8px; background:var(--bg); color:var(--ink); outline:none; width:100%; }
  :where(input,textarea,select):focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea { resize:vertical; min-height:52px; } :where(input,textarea,select):disabled { opacity:.6; cursor:not-allowed; }

  .badge { font-family:var(--mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:5px; white-space:nowrap; }
  .b-draft { color:var(--muted); background:var(--panel-2); border:1px solid var(--line-2); }
  .b-approved { color:var(--info); background:var(--info-soft); }
  .b-active { color:var(--good); background:var(--good-soft); }
  .b-superseded { color:var(--faint); background:var(--panel-2); }
  .b-retired { color:var(--crit); background:var(--crit-soft); }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .d-draft { background:var(--faint); } .d-approved { background:var(--info); } .d-active { background:var(--good); } .d-superseded { background:var(--line-2); } .d-retired { background:var(--crit); }
  .freq { font-family:var(--mono); font-size:10px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:2px 7px; white-space:nowrap; } .freq.none { color:var(--faint); background:var(--panel-2); }

  /* ---------- shell ---------- */
  .topbar { height:52px; display:flex; align-items:center; gap:12px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:9px; font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .brand .mark { color:var(--accent); } .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .topbar .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
  .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:var(--good-soft); } .status.warn { color:var(--warn); background:var(--warn-soft); }

  .app { display:flex; height:calc(100vh - 52px); }
  .rail { width:288px; flex:none; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  .rail-top { padding:14px 14px 10px; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid var(--line); }
  .rail-actions { display:flex; gap:8px; } .rail-actions .btn { flex:1; justify-content:center; }
  .rail-load { display:flex; gap:4px; }
  .rail-load .btn { flex:1; justify-content:center; padding:5px 6px; font-size:11.5px; color:var(--muted); }
  .search { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--line-2); border-radius:9px; padding:7px 11px; }
  .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .search input { border:0; background:transparent; padding:0; }
  .rail-list { flex:1; overflow-y:auto; padding:8px; }
  .rail-count { padding:2px 8px 8px; }

  .grp { margin-bottom:2px; }
  .grp-head { width:100%; display:flex; align-items:center; gap:8px; padding:7px 8px; background:transparent; border:0; border-radius:8px; color:var(--ink); text-align:left; }
  .grp-head:hover { background:var(--panel-2); }
  .grp-name { font-weight:670; font-size:13.5px; } .grp-ct { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--faint); }
  .caret { color:var(--faint); transition:transform .12s; flex:none; } .caret.open { transform:rotate(90deg); }
  .sub { padding:5px 8px 3px 26px; } .sub .lbl { font-size:9px; }
  .item { width:100%; display:flex; align-items:center; gap:9px; padding:8px 10px; margin:1px 0; background:transparent; border:0; border-radius:8px; color:var(--ink); text-align:left; position:relative; }
  .item.ind { padding-left:30px; } .item.ind2 { padding-left:40px; }
  .item:hover { background:var(--panel-2); }
  .item.sel { background:var(--accent-soft); }
  .item.sel::before { content:""; position:absolute; left:2px; top:6px; bottom:6px; width:3px; border-radius:3px; background:var(--accent); }
  .item .nm { font-weight:560; font-size:13px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item .mt { font-family:var(--mono); font-size:10px; color:var(--faint); margin-top:1px; }
  .item .col { min-width:0; flex:1; }
  .item.sel .nm { color:var(--accent); font-weight:640; }
  .newmark { font-family:var(--mono); font-size:9px; color:var(--accent); background:var(--accent-soft); padding:1px 6px; border-radius:4px; }

  /* ---------- detail ---------- */
  .detail { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); text-align:center; padding:40px; }
  .empty .big { font-size:17px; color:var(--ink); font-weight:650; } .empty svg { color:var(--line-2); }
  .recommend { display:inline-flex; gap:8px; align-items:flex-start; text-align:left; max-width:460px; margin-top:6px; font-size:12.5px; color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent); border-radius:9px; padding:10px 12px; } .recommend b { color:var(--ink); }

  .dhead { background:var(--panel); border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .dtitle { font-size:20px; font-weight:700; letter-spacing:-.02em; line-height:1.2; text-wrap:balance; }
  .dsub { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:12.5px; color:var(--muted); flex-wrap:wrap; }
  .dsub .code { font-family:var(--mono); } .dsub .clschip { display:inline-flex; align-items:center; gap:5px; background:var(--panel-2); border:1px solid var(--line); border-radius:999px; padding:2px 10px; font-size:11.5px; }
  .dhead-right { margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .vpick { display:inline-flex; align-items:center; gap:7px; background:var(--panel-2); border:1px solid var(--line-2); border-radius:9px; padding:4px 6px 4px 10px; }

  .dirty { font-size:12px; color:var(--warn); font-weight:600; display:inline-flex; align-items:center; gap:6px; } .dirty::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--warn); }

  .dtabs { background:var(--panel); border-bottom:1px solid var(--line); padding:0 22px; display:flex; gap:2px; }
  .dtab { border:0; background:transparent; color:var(--muted); font-weight:600; font-size:13.5px; padding:11px 14px; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .dtab:hover { color:var(--ink); } .dtab.on { color:var(--accent); border-bottom-color:var(--accent); }
  .dtab .pill { font-family:var(--mono); font-size:10px; font-weight:700; margin-left:6px; color:var(--muted); background:var(--panel-2); border:1px solid var(--line); padding:0 6px; border-radius:999px; }

  .dbody { flex:1; overflow-y:auto; padding:22px; }
  .wrap { max-width:860px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
  .lockbar { display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent); border-radius:10px; padding:10px 14px; }

  .sec { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--sh); }
  .sec > header { padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .sec > header h3 { font-size:13.5px; font-weight:660; } .sec > header .ct { font-family:var(--mono); font-size:11px; color:var(--faint); }
  .sec > header .hact { margin-left:auto; display:flex; gap:8px; }
  .sec-body { padding:16px; display:flex; flex-direction:column; gap:14px; }
  .field { display:flex; flex-direction:column; gap:5px; } .g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; } .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:680px){ .g2,.g3 { grid-template-columns:1fr; } }
  .hint { font-size:11.5px; color:var(--faint); } .empty-in { color:var(--faint); font-size:13px; font-style:italic; padding:4px 0; }
  .addbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* tasks */
  .task { border:1px solid var(--line); border-radius:11px; background:var(--panel-2); overflow:hidden; }
  .task-top { display:flex; align-items:center; gap:10px; padding:9px 11px; }
  .tseq { font-family:var(--mono); font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 9px; font-size:12px; flex:none; }
  .tinstr { flex:1; } .tresp { width:auto; flex:none; }
  .tmove { display:flex; gap:3px; flex:none; }
  .task-extra { padding:0 11px 11px 48px; display:flex; flex-direction:column; gap:10px; }

  /* matrix */
  .scroll { overflow-x:auto; }
  table.mtx { border-collapse:separate; border-spacing:0; width:100%; min-width:480px; }
  table.mtx th, table.mtx td { padding:9px 8px; border-bottom:1px solid var(--line); }
  table.mtx thead th { text-align:center; vertical-align:bottom; } table.mtx th.tc, table.mtx td.tc { text-align:left; min-width:220px; }
  .fh { display:flex; flex-direction:column; align-items:center; gap:2px; } .fh .fl { font-weight:660; font-size:12px; white-space:nowrap; } .fh .fs { font-family:var(--mono); font-size:9px; color:var(--faint); }
  table.mtx td.c { text-align:center; }
  .cbx { appearance:none; -webkit-appearance:none; width:20px; height:20px; border:1.5px solid var(--line-2); border-radius:6px; cursor:pointer; position:relative; vertical-align:middle; background:var(--bg); }
  .cbx:hover:not(:disabled) { border-color:var(--accent); } .cbx:checked { background:var(--accent); border-color:var(--accent); }
  .cbx:checked::after { content:""; position:absolute; left:6px; top:2px; width:5px; height:10px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .cbx:disabled { cursor:not-allowed; opacity:.85; } .cbx:disabled:checked { background:var(--faint); border-color:var(--faint); }
  .ti { font-weight:550; font-size:13px; } .tmn { font-family:var(--mono); font-size:10px; color:var(--faint); }
  tr.tot td { border-bottom:0; font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; padding-top:8px; } tr.tot td.tc { text-align:right; color:var(--faint); }
  .drops { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; }
  .drop { border:1px solid var(--line); border-radius:10px; padding:11px 12px; } .drop.empty { opacity:.55; }
  .drop h4 { font-size:12.5px; display:flex; align-items:baseline; gap:8px; } .drop h4 .n { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:1px 7px; border-radius:999px; }
  .drop ul { margin:8px 0 0; padding-left:16px; font-size:12px; color:var(--muted); } .drop li { margin:2px 0; }
  table.tl { border-collapse:collapse; width:100%; min-width:480px; font-size:12px; }
  table.tl th, table.tl td { padding:6px 4px; text-align:center; border-bottom:1px solid var(--line); }
  table.tl th.rl, table.tl td.rl { text-align:left; white-space:nowrap; font-weight:560; padding-right:12px; } table.tl th { font-family:var(--mono); font-size:10px; color:var(--faint); font-weight:600; }
  .tldot { width:9px; height:9px; border-radius:50%; background:var(--accent); display:inline-block; } .cap { font-size:11.5px; color:var(--faint); margin-top:8px; }
  .freqtags { display:flex; gap:6px; flex-wrap:wrap; } .freqtag { display:inline-flex; align-items:center; gap:3px; font-family:var(--mono); font-size:11px; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 4px 3px 9px; }
  .rowline { display:flex; gap:8px; align-items:center; }

  /* modal */
  .ovl { position:fixed; inset:0; background:rgba(12,22,18,.5); display:flex; align-items:flex-start; justify-content:center; padding:44px 16px; z-index:60; overflow:auto; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:16px; width:min(680px,100%); box-shadow:var(--sh-2); }
  .modal header { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--line); } .modal header h3 { font-size:15px; }
  .modal .mbody { padding:16px 18px; }
  .modal .side-tabs { display:flex; gap:4px; margin-bottom:12px; } .modal .side-tabs button { border:0; background:var(--panel-2); color:var(--muted); padding:5px 11px; border-radius:8px; font-weight:600; } .modal .side-tabs button.on { background:var(--accent-soft); color:var(--accent); }
  pre.json { font-family:var(--mono); font-size:11.5px; margin:0; white-space:pre-wrap; word-break:break-word; max-height:52vh; overflow:auto; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:12px; }
  .issue { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; padding:9px 11px; border-radius:8px; background:var(--crit-soft); border:1px solid color-mix(in srgb,var(--crit) 22%,transparent); margin-bottom:8px; }
  .issue .p { font-family:var(--mono); font-size:11px; color:var(--crit); flex:none; }
  .allgood { display:flex; align-items:center; gap:9px; color:var(--good); font-weight:600; }
  .drag .detail { outline:2px dashed var(--accent); outline-offset:-10px; }
  @media (max-width:760px){ .rail { width:230px; } .dbody { padding:16px; } }
</style>
</head>
