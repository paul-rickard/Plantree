<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Job Plans</title>
<style>
  :root {
    --bg:#eef1ef; --panel:#fff; --panel-2:#f7f9f7; --ink:#15201d; --muted:#5a6a65; --faint:#8a9a94;
    --line:#e2e7e4; --line-2:#d2dad6; --accent:#0f6f66; --accent-h:#148a7e; --accent-soft:#e4f1ee;
    --good:#1e8e5a; --good-soft:color-mix(in srgb,#1e8e5a 14%,transparent);
    --warn:#b3760f; --warn-soft:color-mix(in srgb,#b3760f 15%,transparent);
    --crit:#c0453b; --crit-soft:color-mix(in srgb,#c0453b 12%,transparent);
    --info:#3a6ea5; --info-soft:color-mix(in srgb,#3a6ea5 13%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --sh:0 1px 2px rgba(16,32,28,.05); --sh-2:0 8px 30px rgba(16,32,28,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d1512; --panel:#141f1b; --panel-2:#111b17; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6c7d77;
      --line:#25322d; --line-2:#33433d; --accent:#38b4a4; --accent-h:#54c6b7; --accent-soft:#16302c;
      --good:#37b37a; --good-soft:color-mix(in srgb,#37b37a 16%,transparent);
      --warn:#d69b3a; --warn-soft:color-mix(in srgb,#d69b3a 15%,transparent);
      --crit:#e0685d; --crit-soft:color-mix(in srgb,#e0685d 15%,transparent);
      --info:#6c9fd6; --info-soft:color-mix(in srgb,#6c9fd6 15%,transparent); --sh-2:0 10px 34px rgba(0,0,0,.4); }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; overflow:hidden; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,h4 { margin:0; } .mono { font-family:var(--mono); } .num { font-variant-numeric:tabular-nums; }
  .lbl { font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); font-weight:700; font-family:var(--mono); }

  button { font:inherit; cursor:pointer; }
  .btn { font-weight:600; font-size:13px; padding:7px 13px; border-radius:9px; border:1px solid var(--line-2); background:var(--panel); color:var(--ink); display:inline-flex; align-items:center; gap:7px; transition:border-color .12s, background .12s, color .12s; white-space:nowrap; }
  .btn:hover { border-color:var(--faint); } .btn.primary { background:var(--accent); color:#fff; border-color:transparent; } .btn.primary:hover { background:var(--accent-h); }
  .btn.ghost { border-color:transparent; background:transparent; color:var(--muted); } .btn.ghost:hover { background:var(--panel-2); color:var(--ink); }
  .btn.sm { padding:5px 10px; font-size:12px; border-radius:8px; } .btn.danger { color:var(--crit); } .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn.on { background:var(--warn-soft); color:var(--warn); border-color:color-mix(in srgb,var(--warn) 35%,transparent); }
  .x { border:0; background:transparent; color:var(--faint); padding:2px 5px; border-radius:6px; font-size:13px; } .x:hover { color:var(--crit); background:var(--crit-soft); }

  input[type=text],input[type=number],textarea,select { font:inherit; padding:8px 10px; border:1px solid var(--line-2); border-radius:8px; background:var(--bg); color:var(--ink); outline:none; width:100%; }
  :where(input,textarea,select):focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea { resize:vertical; min-height:50px; } :where(input,textarea,select):disabled { opacity:.6; cursor:not-allowed; }

  .nbadge { font-family:var(--mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; padding:2px 7px; border-radius:5px; }
  .nb-class { color:var(--accent); background:var(--accent-soft); } .nb-model { color:var(--info); background:var(--info-soft); } .nb-instance { color:var(--good); background:var(--good-soft); }
  .prov { display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:9px; letter-spacing:.03em; text-transform:uppercase; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap; }
  .p-class { color:var(--muted); background:var(--panel-2); border:1px solid var(--line-2); } .p-inherited { color:var(--info); background:var(--info-soft); }
  .p-overridden { color:var(--accent); background:var(--accent-soft); } .p-enforced { color:var(--warn); background:var(--warn-soft); }
  .p-added { color:var(--good); background:var(--good-soft); } .p-excluded { color:var(--faint); background:var(--panel-2); }
  .freq { font-family:var(--mono); font-size:10px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:2px 7px; white-space:nowrap; } .freq.none { color:var(--faint); background:var(--panel-2); }

  .topbar { height:52px; display:flex; align-items:center; gap:12px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:9px; font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .brand .mark { color:var(--accent); } .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .topbar .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; } .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:var(--good-soft); } .status.warn { color:var(--warn); background:var(--warn-soft); }

  .app { display:flex; height:calc(100vh - 52px); }
  .rail { width:296px; flex:none; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  .rail-top { padding:14px 14px 10px; display:flex; flex-direction:column; gap:10px; border-bottom:1px solid var(--line); }
  .rail-actions { display:flex; gap:8px; } .rail-actions .btn { flex:1; justify-content:center; }
  .rail-load { display:flex; gap:4px; } .rail-load .btn { flex:1; justify-content:center; padding:5px 6px; font-size:11.5px; color:var(--muted); }
  .search { display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--line-2); border-radius:9px; padding:7px 11px; } .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); } .search input { border:0; background:transparent; padding:0; }
  .rail-list { flex:1; overflow-y:auto; padding:8px; }

  .node { width:100%; display:flex; align-items:center; gap:7px; padding:7px 8px; margin:1px 0; background:transparent; border:0; border-radius:8px; color:var(--ink); text-align:left; position:relative; }
  .node:hover { background:var(--panel-2); } .node.sel { background:var(--accent-soft); }
  .node.sel::before { content:""; position:absolute; left:1px; top:6px; bottom:6px; width:3px; border-radius:3px; background:var(--accent); }
  .node.lvl1 { padding-left:22px; } .node.lvl2 { padding-left:40px; }
  .node .ct { flex:none; width:14px; display:flex; justify-content:center; color:var(--faint); }
  .caret { transition:transform .12s; } .caret.open { transform:rotate(90deg); }
  .node .col { min-width:0; flex:1; } .node .nm { font-weight:570; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; } .node.sel .nm { color:var(--accent); font-weight:640; }
  .node .mt { font-family:var(--mono); font-size:9.5px; color:var(--faint); }
  .node .tag { font-family:var(--mono); font-size:8.5px; letter-spacing:.04em; text-transform:uppercase; font-weight:700; color:var(--faint); }

  .detail { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
  .empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); text-align:center; padding:40px; } .empty .big { font-size:17px; color:var(--ink); font-weight:650; } .empty svg { color:var(--line-2); }
  .dhead { background:var(--panel); border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .dtitle { font-size:20px; font-weight:700; letter-spacing:-.02em; line-height:1.2; }
  .dsub { display:flex; align-items:center; gap:8px; margin-top:4px; font-size:12.5px; color:var(--muted); flex-wrap:wrap; } .dsub .code { font-family:var(--mono); }
  .crumb { color:var(--faint); } .crumb b { color:var(--muted); font-weight:600; }
  .dhead-right { margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .dirty { font-size:12px; color:var(--warn); font-weight:600; display:inline-flex; align-items:center; gap:6px; } .dirty::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--warn); }

  .dtabs { background:var(--panel); border-bottom:1px solid var(--line); padding:0 22px; display:flex; gap:2px; }
  .dtab { border:0; background:transparent; color:var(--muted); font-weight:600; font-size:13.5px; padding:11px 14px; border-bottom:2px solid transparent; margin-bottom:-1px; } .dtab:hover { color:var(--ink); } .dtab.on { color:var(--accent); border-bottom-color:var(--accent); }
  .dtab .pill { font-family:var(--mono); font-size:10px; font-weight:700; margin-left:6px; color:var(--muted); background:var(--panel-2); border:1px solid var(--line); padding:0 6px; border-radius:999px; }
  .dbody { flex:1; overflow-y:auto; padding:22px; } .wrap { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }

  .infobar { display:flex; align-items:flex-start; gap:9px; font-size:12.5px; border-radius:10px; padding:10px 14px; } .infobar.i { color:var(--info); background:var(--info-soft); border:1px solid color-mix(in srgb,var(--info) 22%,transparent); } .infobar b { color:var(--ink); }
  .sec { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--sh); }
  .sec > header { padding:13px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; } .sec > header h3 { font-size:13.5px; font-weight:660; } .sec > header .ct { font-family:var(--mono); font-size:11px; color:var(--faint); } .sec > header .hact { margin-left:auto; display:flex; gap:8px; }
  .sec-body { padding:16px; display:flex; flex-direction:column; gap:12px; }
  .field { display:flex; flex-direction:column; gap:5px; } .g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; } .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:680px){ .g2,.g3 { grid-template-columns:1fr; } }
  .hint { font-size:11.5px; color:var(--faint); } .empty-in { color:var(--faint); font-size:13px; font-style:italic; padding:4px 0; } .addbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .rowline { display:flex; gap:8px; align-items:center; }

  /* attribute / parameter rows with locking */
  .arow { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line); } .arow:last-child { border-bottom:0; }
  .arow .an { font-weight:560; min-width:150px; } .arow .an .sub { font-weight:400; color:var(--faint); font-size:11px; font-family:var(--mono); }
  .arow .av { flex:1; } .arow .av .ro { font-family:var(--mono); font-variant-numeric:tabular-nums; } .arow .av .ro .u { color:var(--faint); }
  .arow .aa { display:flex; gap:6px; align-items:center; }

  /* tasks */
  .task { border:1px solid var(--line); border-radius:11px; background:var(--panel-2); overflow:hidden; } .task.ex { opacity:.6; }
  .task-top { display:flex; align-items:center; gap:10px; padding:9px 11px; } .tseq { font-family:var(--mono); font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 9px; font-size:12px; flex:none; }
  .tname { flex:1; min-width:0; } .tname .ti { font-weight:560; } .tname .ti.ex { text-decoration:line-through; color:var(--faint); } .tname .tm { font-family:var(--mono); font-size:10px; color:var(--faint); }
  .task-extra { padding:0 11px 11px 48px; display:flex; flex-direction:column; gap:10px; } .taus { display:flex; gap:6px; align-items:center; }

  .scroll { overflow-x:auto; }
  table.mtx { border-collapse:separate; border-spacing:0; width:100%; min-width:480px; } table.mtx th, table.mtx td { padding:9px 8px; border-bottom:1px solid var(--line); }
  table.mtx thead th { text-align:center; vertical-align:bottom; } table.mtx th.tc, table.mtx td.tc { text-align:left; min-width:220px; }
  .fh { display:flex; flex-direction:column; align-items:center; gap:2px; } .fh .fl { font-weight:660; font-size:12px; white-space:nowrap; } .fh .fs { font-family:var(--mono); font-size:9px; color:var(--faint); }
  table.mtx td.c { text-align:center; }
  .cbx { appearance:none; -webkit-appearance:none; width:20px; height:20px; border:1.5px solid var(--line-2); border-radius:6px; cursor:pointer; position:relative; vertical-align:middle; background:var(--bg); }
  .cbx:hover:not(:disabled) { border-color:var(--accent); } .cbx:checked { background:var(--accent); border-color:var(--accent); } .cbx:checked::after { content:""; position:absolute; left:6px; top:2px; width:5px; height:10px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .cbx:disabled { cursor:not-allowed; opacity:.85; } .cbx:disabled:checked { background:var(--faint); border-color:var(--faint); }
  .ti2 { font-weight:550; font-size:13px; } .tmn { font-family:var(--mono); font-size:10px; color:var(--faint); }
  tr.tot td { border-bottom:0; font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; padding-top:8px; } tr.tot td.tc { text-align:right; color:var(--faint); }
  .drops { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; } .drop { border:1px solid var(--line); border-radius:10px; padding:11px 12px; } .drop.empty { opacity:.55; }
  .drop h4 { font-size:12.5px; display:flex; align-items:baseline; gap:8px; } .drop h4 .n { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:1px 7px; border-radius:999px; } .drop ul { margin:8px 0 0; padding-left:16px; font-size:12px; color:var(--muted); } .drop li { margin:2px 0; } .drop .src { color:var(--faint); }
  .freqtags { display:flex; gap:6px; flex-wrap:wrap; } .freqtag { display:inline-flex; align-items:center; gap:3px; font-family:var(--mono); font-size:11px; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 4px 3px 9px; }
  .months { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; } .mo { border:1px solid var(--line); border-radius:9px; padding:9px 10px; background:var(--panel-2); } .mo.absorb { background:var(--warn-soft); } .mo .mm { font-family:var(--mono); font-size:10px; color:var(--faint); } .mo .ml { font-weight:640; font-size:13px; } .mo .md { font-size:11px; color:var(--muted); } .mo .cn { font-family:var(--mono); font-size:11px; color:var(--accent); }
  .summary { display:flex; gap:18px; flex-wrap:wrap; align-items:center; margin-bottom:12px; } .stat .k { color:var(--muted); font-size:11.5px; } .stat b { font-family:var(--mono); font-size:18px; } .cap { font-size:11.5px; color:var(--faint); margin-top:8px; }

  .ovl { position:fixed; inset:0; background:rgba(12,22,18,.5); display:flex; align-items:flex-start; justify-content:center; padding:44px 16px; z-index:60; overflow:auto; } .modal { background:var(--panel); border:1px solid var(--line); border-radius:16px; width:min(680px,100%); box-shadow:var(--sh-2); } .modal header { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--line); } .modal .mbody { padding:16px 18px; } pre.json { font-family:var(--mono); font-size:11.5px; margin:0; white-space:pre-wrap; word-break:break-word; max-height:60vh; overflow:auto; background:var(--bg); border:1px solid var(--line); border-radius:9px; padding:12px; }
  .drag .detail { outline:2px dashed var(--accent); outline-offset:-10px; }
  .back-mobile { display:none; }

  @media (max-width:860px){ .rail { width:248px; } }
  @media (max-width:680px){
    /* single-column: rail is the list screen, detail slides in */
    .app { display:block; position:relative; }
    .rail { width:100%; height:calc(100vh - 52px); }
    .detail { display:none; position:absolute; inset:0; height:calc(100vh - 52px); }
    #app.show-detail .rail { display:none; }
    #app.show-detail .detail { display:flex; }
    .back-mobile { display:inline-flex; }
    .dbody { padding:14px; } .wrap { gap:14px; }
    .dhead { padding:12px 14px; gap:10px; flex-direction:column; align-items:stretch; }
    .dhead-right { margin-left:0; justify-content:flex-start; }
    .dtitle { font-size:18px; } .dtabs { padding:0 14px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .dtab { padding:11px 12px; white-space:nowrap; }
    .sec-body { padding:14px; }
    /* stack attribute / parameter rows */
    .arow { flex-wrap:wrap; gap:8px 10px; }
    .arow .an { width:100%; min-width:0; } .arow .av { width:100%; order:2; }
    .arow .prov { order:3; } .arow .aa { order:4; margin-left:auto; }
    .g2, .g3 { grid-template-columns:1fr; }
    .rail-load .btn { font-size:12px; }
    .topbar { padding:0 12px; } .topbar .brand small { display:none; }
    .task-extra { padding:0 11px 11px 14px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/></svg>Plantree <small>· Job Plans</small></div>

  <div class="app" id="app">
    <aside class="rail">
      <div class="rail-top">
        <div class="rail-actions"><button class="btn primary" id="newClass">+ New class</button></div>

        <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--faint)"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg><input id="q" placeholder="Search classes, models, instances…" /></div>
      </div>
      <div class="rail-list" id="railList"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
  <input type="file" id="fileInput" accept=".json" multiple hidden />
<script>
(function () {
  "use strict";

  var RESP = ["none", "passfail", "numeric", "text", "choice"];
  var fsaSupported = typeof window.showDirectoryPicker === "function";
  var families = [], folderHandle = null;
  var G = { q: "", collapsed: {} };
  var E = { fam: -1, mi: -1, ii: -1, tab: "tasks" }; // selection: fam idx, model idx (-1=class level), instance idx (-1)
  var idSeq = 1;

  function el(t, p, k) { var n = document.createElement(t); if (p) Object.keys(p).forEach(function (key) { if (key === "class") n.className = p[key]; else if (key === "html") n.innerHTML = p[key]; else if (key.slice(0, 2) === "on") n.addEventListener(key.slice(2), p[key]); else if (key in n) { try { n[key] = p[key]; } catch (e) { n.setAttribute(key, p[key]); } } else n.setAttribute(key, p[key]); }); (k || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); }); return n; }
  function nid(pfx) { return pfx + "_" + (idSeq++); }
  function freqLabel(f) { if (f.label) return f.label; if (f.interval === 1) return UNIT[f.unit]; if (f.unit === "month") return f.interval + "-Monthly"; if (f.unit === "year") return f.interval + "-Yearly"; return "Every " + f.interval + " " + f.unit + "s"; }
  function fsub(f) { return "every " + f.interval + " " + f.unit + (f.interval > 1 ? "s" : ""); }
  function csv(a) { return (a || []).join(", "); } function parseCsv(s) { return (s || "").split(",").map(function (x) { return x.trim(); }).filter(Boolean); }

  /* ---------- seed families ---------- */
  function T(id, i, r, f, opt) { return Object.assign({ id: id, instruction: i, responseType: r, unit: null, acceptableRange: null, choices: null, requiredSkills: [], frequencyIds: f || [], enforced: false }, opt || {}); }
  function seed() {
    return [
      { id: "gen", code: "GEN", name: "Standby Generator", description: "Standby diesel generators.",
