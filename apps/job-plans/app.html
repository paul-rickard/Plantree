<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plantree — Job Plans</title>
<style>
  :root {
    --bg:#f4f6f5; --surface:#fff; --surface-2:#fbfcfb; --ink:#16201e; --muted:#5c6b67; --faint:#8a9995;
    --line:#e0e5e2; --line-strong:#d3dad7; --accent:#0e6e66; --accent-hover:#14877d; --accent-soft:#e4f0ee;
    --good:#1e8e5a; --good-soft:color-mix(in srgb,#1e8e5a 13%,transparent);
    --warn:#b77a12; --warn-soft:color-mix(in srgb,#b77a12 13%,transparent);
    --crit:#c0453b; --info:#3a6ea5; --info-soft:color-mix(in srgb,#3a6ea5 12%,transparent);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0e1613; --surface:#16211d; --surface-2:#131e1a; --ink:#e8eeeb; --muted:#9aaaa4; --faint:#6e7e79;
      --line:#26332e; --line-strong:#33433d; --accent:#37b3a4; --accent-hover:#55c7b8; --accent-soft:#17322e;
      --good:#37b37a; --warn:#d69b3a; --crit:#e0685d; --info:#6c9fd6; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; }
  h1,h2,h3 { margin:0; } .mono { font-family:var(--mono); } .num { font-variant-numeric:tabular-nums; }
  .lbl { font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600; font-family:var(--mono); }
  .hidden { display:none !important; }

  /* top bar */
  .top { display:flex; align-items:center; gap:12px; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; flex-wrap:wrap; }
  .brand { display:flex; align-items:center; gap:9px; font-weight:680; font-size:16px; }
  .brand .mark { color:var(--accent); } .brand small { font-weight:500; color:var(--faint); font-family:var(--mono); font-size:11px; }
  .top .actions { display:flex; gap:8px; margin-left:6px; flex-wrap:wrap; }
  .top .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
  .status::before { content:""; width:7px; height:7px; border-radius:50%; background:currentColor; }
  .status.ok { color:var(--good); background:var(--good-soft); } .status.warn { color:var(--warn); background:var(--warn-soft); }

  /* buttons */
  .btn { font:inherit; font-weight:600; font-size:13px; padding:7px 13px; border-radius:8px; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:border-color .12s, background .12s; }
  .btn:hover { border-color:var(--faint); }
  .btn.primary { background:var(--accent); color:#fff; border-color:transparent; } .btn.primary:hover { background:var(--accent-hover); }
  .btn.small { padding:5px 10px; font-size:12px; }
  .btn.accent { color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); }
  .btn.danger { color:var(--crit); } .btn.on { background:var(--warn-soft); color:var(--warn); border-color:color-mix(in srgb,var(--warn) 35%,transparent); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .x { border:0; background:transparent; color:var(--faint); cursor:pointer; padding:2px 5px; font-size:13px; } .x:hover { color:var(--crit); }

  input[type=text],input[type=number],textarea,select { font:inherit; padding:8px 10px; border:1px solid var(--line-strong); border-radius:8px; background:var(--bg); color:var(--ink); outline:none; width:100%; }
  input:focus,textarea:focus,select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  textarea { resize:vertical; min-height:60px; } input:disabled,textarea:disabled,select:disabled { opacity:.6; cursor:not-allowed; }

  .badge { font-family:var(--mono); font-size:9.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:5px; white-space:nowrap; }
  .b-draft { color:var(--muted); background:var(--surface-2); border:1px solid var(--line-strong); }
  .b-approved { color:var(--info); background:var(--info-soft); }
  .b-active { color:var(--good); background:var(--good-soft); }
  .b-superseded { color:var(--faint); background:var(--surface-2); }
  .b-retired { color:var(--crit); background:color-mix(in srgb,var(--crit) 12%,transparent); }
  .freq { font-family:var(--mono); font-size:10px; color:var(--accent); background:var(--accent-soft); border-radius:5px; padding:2px 7px; } .freq.none { color:var(--faint); background:var(--surface-2); }

  /* ---------- GALLERY ---------- */
  .controls { display:flex; align-items:center; gap:12px; padding:14px 20px; flex-wrap:wrap; }
  .search { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line-strong); border-radius:9px; padding:7px 11px; width:min(320px,55vw); }
  .search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .search input { border:0; background:transparent; padding:0; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .fchip { font:inherit; font-size:12px; font-weight:600; padding:5px 11px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface); color:var(--muted); cursor:pointer; }
  .fchip.on { background:var(--accent-soft); color:var(--accent); border-color:color-mix(in srgb,var(--accent) 40%,transparent); }
  .count { margin-left:auto; color:var(--faint); font-size:12.5px; font-family:var(--mono); }

  .grid { padding:6px 20px 40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .gcard { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; cursor:pointer; display:flex; flex-direction:column; gap:11px; transition:border-color .12s, box-shadow .12s, transform .06s; }
  .gcard:hover { border-color:var(--line-strong); box-shadow:0 6px 20px rgba(16,32,28,.06); transform:translateY(-1px); }
  .gcard .title { font-weight:660; font-size:15px; letter-spacing:-.01em; line-height:1.25; }
  .gcard .code { font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:2px; }
  .gcard .desc { font-size:12.5px; color:var(--muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:34px; }
  .gcard .cls { font-family:var(--mono); font-size:10.5px; color:var(--muted); }
  .freqs { display:flex; gap:5px; flex-wrap:wrap; }
  .meta { display:flex; gap:14px; flex-wrap:wrap; border-top:1px solid var(--line); padding-top:11px; font-size:12px; color:var(--muted); }
  .meta b { color:var(--ink); font-variant-numeric:tabular-nums; font-family:var(--mono); }

  .tree { padding:6px 20px 40px; display:flex; flex-direction:column; gap:10px; }
  .grp { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--surface); }
  .grp-head { width:100%; display:flex; align-items:center; gap:10px; padding:12px 15px; background:var(--surface-2); border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--ink); text-align:left; }
  .grp-head:hover { background:color-mix(in srgb,var(--accent) 5%,var(--surface-2)); }
  .grp-name { font-weight:680; font-size:15px; letter-spacing:-.01em; }
  .grp-meta { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .caret { color:var(--faint); transition:transform .12s; flex:none; } .caret.open { transform:rotate(90deg); }
  .sub-head { width:100%; display:flex; align-items:center; gap:9px; padding:8px 15px 8px 26px; background:transparent; border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--muted); text-align:left; }
  .sub-head:hover { color:var(--ink); } .sub-name { font-weight:620; font-size:12.5px; font-family:var(--mono); color:var(--ink); }
  .plan-row { width:100%; display:flex; align-items:center; gap:12px; padding:11px 15px; background:transparent; border:0; border-bottom:1px solid var(--line); cursor:pointer; font:inherit; color:var(--ink); text-align:left; }
  .plan-row.ind { padding-left:44px; } .plan-row:last-child { border-bottom:0; } .plan-row:hover { background:var(--surface-2); }
  .pr-name { font-weight:600; font-size:13.5px; } .pr-code { font-family:var(--mono); font-size:11px; color:var(--faint); }
  .pr-freqs { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .pr-tasks { font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap; min-width:60px; text-align:right; }
  @media (max-width:640px){ .pr-freqs { display:none; } }
  .empty { padding:60px 20px; text-align:center; color:var(--muted); }
  .empty .big { font-size:16px; color:var(--ink); font-weight:600; margin-bottom:6px; }
  .recommend { display:inline-flex; gap:8px; align-items:flex-start; text-align:left; max-width:520px; margin:14px auto 0; font-size:12.5px; color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent); border-radius:9px; padding:10px 12px; }
  .recommend b { color:var(--ink); }
  .drag { outline:2px dashed var(--accent); outline-offset:-10px; }

  /* ---------- EDITOR ---------- */
  .etop { display:flex; align-items:center; gap:10px; padding:11px 20px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:15; flex-wrap:wrap; }
  .etop .fn { font-family:var(--mono); font-size:12px; color:var(--muted); } .etop .fn b { color:var(--ink); }
  .etop .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .toast { font-size:12.5px; font-weight:600; color:var(--good); min-height:16px; } .toast.err { color:var(--crit); }
  .elayout { display:grid; grid-template-columns:minmax(0,1fr) 380px; align-items:start; }
  .emain { padding:18px 20px; display:flex; flex-direction:column; gap:14px; min-width:0; }
  .eside { position:sticky; top:53px; height:calc(100vh - 53px); border-left:1px solid var(--line); background:var(--surface-2); display:flex; flex-direction:column; }
  .side-tabs { display:flex; gap:4px; padding:10px 12px; border-bottom:1px solid var(--line); }
  .side-tabs button { border:0; background:transparent; color:var(--muted); padding:5px 10px; border-radius:7px; font:inherit; cursor:pointer; }
  .side-tabs button.on { background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .side-body { flex:1; overflow:auto; padding:14px; }
  pre.json { font-family:var(--mono); font-size:11.5px; margin:0; white-space:pre-wrap; word-break:break-word; }
  .issues { display:flex; flex-direction:column; gap:8px; }
  .issue { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; padding:9px 11px; border-radius:8px; background:color-mix(in srgb,var(--crit) 9%,transparent); border:1px solid color-mix(in srgb,var(--crit) 22%,transparent); }
  .issue .path { font-family:var(--mono); font-size:11px; color:var(--crit); flex:none; }
  .all-good { display:flex; align-items:center; gap:9px; color:var(--good); font-weight:600; font-size:13px; }
  .epanel { background:var(--surface); border:1px solid var(--line); border-radius:12px; }
  .epanel > h2 { font-size:13.5px; padding:12px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .epanel > h2 .count { margin-left:0; font-family:var(--mono); font-size:11px; color:var(--muted); font-weight:500; }
  .epanel-body { padding:16px; display:flex; flex-direction:column; gap:14px; }
  .field { display:flex; flex-direction:column; gap:5px; } .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; } .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .versionbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .lock-note { display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--warn); background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 26%,transparent); padding:9px 12px; border-radius:9px; }
  .task { border:1px solid var(--line); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:10px; background:var(--surface-2); }
  .task-head { display:flex; align-items:center; gap:10px; } .task-head .move { margin-left:auto; display:flex; gap:4px; }
  .seq { font-family:var(--mono); font-weight:700; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:2px 8px; font-size:12px; }
  .rowline { display:flex; gap:8px; align-items:center; } .rowline input { flex:1; }
  .empty-inline { color:var(--faint); font-size:13px; font-style:italic; } .chip-hint { font-size:11.5px; color:var(--faint); }
  .addbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .freqtag { display:inline-flex; align-items:center; gap:3px; font-family:var(--mono); font-size:11px; color:var(--accent); background:var(--accent-soft); border-radius:6px; padding:3px 4px 3px 9px; }
  .seg { display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:2px; }
  .seg button { border:0; background:transparent; font:inherit; font-size:12.5px; font-weight:600; color:var(--muted); padding:5px 12px; border-radius:6px; cursor:pointer; }
  .seg button.on { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(16,32,28,.05); }
  .scroll { overflow-x:auto; }
  table.matrix { border-collapse:separate; border-spacing:0; width:100%; min-width:520px; }
  table.matrix th, table.matrix td { padding:8px 7px; border-bottom:1px solid var(--line); }
  table.matrix thead th { text-align:center; vertical-align:bottom; }
  table.matrix th.tcol, table.matrix td.tcol { text-align:left; min-width:220px; }
  .freqhead { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .freqhead .fl { font-weight:650; font-size:12px; white-space:nowrap; } .freqhead .fs { font-family:var(--mono); font-size:9px; color:var(--faint); }
  table.matrix td.cell { text-align:center; }
  .cbx { appearance:none; -webkit-appearance:none; width:19px; height:19px; border:1.5px solid var(--line-strong); border-radius:5px; cursor:pointer; position:relative; vertical-align:middle; background:var(--bg); }
  .cbx:hover:not(:disabled) { border-color:var(--accent); }
  .cbx:checked { background:var(--accent); border-color:var(--accent); }
  .cbx:checked::after { content:""; position:absolute; left:5.5px; top:2px; width:5px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .cbx:disabled { cursor:not-allowed; opacity:.85; } .cbx:disabled:checked { background:var(--faint); border-color:var(--faint); }
  .ti { font-weight:540; font-size:13px; } .tm { font-family:var(--mono); font-size:10px; color:var(--faint); }
  tr.totals td { border-bottom:0; font-family:var(--mono); font-size:11px; color:var(--muted); text-align:center; padding-top:8px; }
  tr.totals td.tcol { text-align:right; color:var(--faint); }
  .drops { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .drop { border:1px solid var(--line); border-radius:10px; padding:11px 12px; background:var(--surface-2); }
  .drop h3 { font-size:12.5px; display:flex; align-items:baseline; gap:8px; }
  .drop h3 .n { margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--accent); background:var(--accent-soft); padding:1px 7px; border-radius:999px; }
  .drop ul { margin:8px 0 0; padding-left:16px; font-size:12px; color:var(--muted); } .drop li { margin:2px 0; } .drop.empty { opacity:.6; }
  table.tl { border-collapse:collapse; width:100%; min-width:520px; font-size:12px; }
  table.tl th, table.tl td { padding:6px 4px; text-align:center; border-bottom:1px solid var(--line); }
  table.tl th.rl, table.tl td.rl { text-align:left; white-space:nowrap; font-weight:560; padding-right:12px; }
  table.tl th { font-family:var(--mono); font-size:10px; color:var(--faint); font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); display:inline-block; }
  .cap { font-size:11.5px; color:var(--faint); margin-top:8px; }
  @media (max-width:900px){ .elayout { grid-template-columns:1fr; } .eside { position:static; height:auto; border-left:0; border-top:1px solid var(--line);} .grid2,.grid3 { grid-template-columns:1fr; } }
</style>
</head>
<body>
  <!-- ============ GALLERY VIEW ============ -->
  <div id="galleryView">
    <div class="top">
      <div class="brand">
        <svg class="mark" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 22V12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 12L6.5 7.5M12 12l5.5-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="12" r="2" fill="currentColor"/><circle cx="6" cy="7" r="2" fill="currentColor"/><circle cx="18" cy="7" r="2" fill="currentColor"/></svg>
        Plantree <small>· Job Plans</small>
      </div>
      <div class="actions">
        <button class="btn primary" id="newPlan">+ New plan</button>
        <button class="btn" id="openFolder">Open folder…</button>
        <button class="btn" id="chooseFiles">Choose files…</button>
        <button class="btn" id="loadSamples">Load samples</button>
      </div>
      <div class="right"><span id="support" class="status warn">checking…</span></div>
    </div>
    <div class="controls">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--faint)"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2" stroke-linecap="round"/></svg>
        <input id="q" placeholder="Search name, code, class…" />
      </div>
      <div class="chips" id="viewToggle">
        <button class="fchip on" data-view="grouped">By class</button>
        <button class="fchip" data-view="grid">Grid</button>
      </div>
      <div class="chips" id="stateChips"></div>
      <span id="sortWrap" style="display:inline-flex;align-items:center;gap:8px"><label class="lbl" for="sort">Sort</label>
        <select id="sort" style="width:auto"><option value="name">Name</option><option value="code">Code</option><option value="updated">Updated</option><option value="tasks">Tasks</option></select></span>
      <span class="count" id="count"></span>
    </div>
    <div id="view"></div>
  </div>

  <!-- ============ EDITOR VIEW ============ -->
  <div id="editorView" class="hidden">
    <div class="etop">
      <button class="btn" id="backBtn">← Gallery</button>
      <button class="btn primary" id="saveBtn">Save</button>
      <button class="btn" id="validateBtn">Validate</button>
      <div class="seg" id="editorTabs"><button data-tab="details" class="on">Details</button><button data-tab="matrix">Matrix</button></div>
      <span class="toast" id="toast"></span>
      <div class="right"><span id="fileName" class="fn">Unsaved</span></div>
    </div>
    <div class="elayout">
      <div class="emain" id="emain"></div>
      <aside class="eside">
        <div class="side-tabs"><button id="tabJson" class="on">JSON document</button><button id="tabValid">Validation</button></div>
        <div class="side-body" id="sideBody"></div>
      </aside>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json" multiple hidden />

<script>
(function () {
  "use strict";
  var UNIT = { day: ["Daily", "d"], week: ["Weekly", "w"], month: ["Monthly", "mo"], year: ["Annual", "y"] };
  var RESPONSE_TYPES = ["none", "passfail", "numeric", "text", "choice"];
  var STATES = ["active", "approved", "draft", "superseded", "retired"];
  var fsaSupported = typeof window.showDirectoryPicker === "function";

  // shared
  var store = [], folderHandle = null, view = "gallery";
  var G = { q: "", viewMode: "grouped", collapsed: {}, stateFilter: "all", sort: "name", usingSamples: true };
  var E = { doc: null, entry: null, sel: 0, sideTab: "json", editorTab: "details" };
  var freqSeq = 1;

  function el(t, p, k) {
    var n = document.createElement(t);
    if (p) Object.keys(p).forEach(function (key) {
      if (key === "class") n.className = p[key];
      else if (key === "html") n.innerHTML = p[key];
      else if (key.slice(0, 2) === "on") n.addEventListener(key.slice(2), p[key]);
      else if (key in n) { try { n[key] = p[key]; } catch (e) { n.setAttribute(key, p[key]); } }
      else n.setAttribute(key, p[key]);
    });
    (k || []).forEach(function (c) { if (c != null) n.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
    return n;
  }
  function nowIso() { return new Date().toISOString(); }
  function slug(s) { return (s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, ""); }
  function csv(a) { return (a || []).join(", "); }
  function parseCsv(s) { return (s || "").split(",").map(function (x) { return x.trim(); }).filter(Boolean); }
  function fmtDate(s) { return s ? String(s).slice(0, 10) : "—"; }
  function freqLabel(f) {
    if (f.label) return f.label;
    if (f.interval === 1) return UNIT[f.unit][0];
    if (f.unit === "month") return f.interval + "-Monthly";
    if (f.unit === "year") return f.interval + "-Yearly";
    return "Every " + f.interval + " " + f.unit + "s";
  }
